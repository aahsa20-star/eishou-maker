<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱オーバーレイ</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sao-blue:     #4FC3F7;
  --sao-teal:     #00BCD4;
  --sao-gold:     #B8952A;
  --sao-red:      #EF5350;
  --sao-purple:   #7C4DFF;
  --sao-white:    #E8F4FD;
  --color-accent: var(--sao-blue);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
vercel-live-feedback, [data-vercel-toolbar] { display: none !important; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* Background overlay */
.overlay-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, rgba(3,10,20,0.9) 0%, rgba(3,10,20,0.6) 100%);
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.5s;
}
.overlay-bg.visible { opacity: 1; }

/* Magic circle canvas */
canvas#magicCircle {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.8s;
}
canvas#magicCircle.visible { opacity: 1; }

/* Chant Window */
.chant-window {
  position: fixed;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  width: 70%;
  max-width: 900px;
  background: rgba(4,20,40,0.9);
  border: 1px solid rgba(79,195,247,0.5);
  border-radius: 0;
  clip-path: polygon(0 16px, 16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
  box-shadow:
    0 0 40px rgba(79,195,247,0.1),
    inset 0 0 40px rgba(79,195,247,0.03);
  padding: 0;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-window.visible { opacity: 1; }

.chant-header {
  display: flex;
  align-items: center;
  padding: 12px 28px;
  border-bottom: 1px solid rgba(79,195,247,0.15);
}
.chant-header-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: rgba(79,195,247,0.5);
  letter-spacing: 0.2em;
}
.chant-header-line {
  flex: 1;
  height: 1px;
  background: rgba(79,195,247,0.15);
  margin: 0 16px;
}
.chant-header-type {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--color-accent);
}

.chant-content {
  padding: 24px 32px 20px;
}

.chant-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
}

.chant-line {
  font-size: 36px;
  font-weight: 700;
  color: var(--sao-white);
  line-height: 1.8;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s ease-out, transform 0.2s ease-out;
}
.chant-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.chant-divider {
  border: none;
  border-top: 1px solid rgba(79,195,247,0.15);
  margin: 16px 0 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-divider.visible { opacity: 1; }

.chant-words {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  color: rgba(79,195,247,0.4);
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-words.visible { opacity: 1; }
.chant-words span {
  margin-right: 12px;
}

/* History Sidebar */
.history-sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 24px 20px;
  z-index: 0;
  pointer-events: none;
  border-left: 1px solid rgba(79,195,247,0.1);
  background: rgba(4,20,40,0.5);
}
.history-sidebar-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: rgba(79,195,247,0.3);
  letter-spacing: 0.2em;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(79,195,247,0.1);
  margin-bottom: 12px;
}
.history-sidebar-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(79,195,247,0.05);
}
.history-sidebar-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: rgba(79,195,247,0.25);
  font-weight: 700;
  flex-shrink: 0;
  width: 20px;
}
.history-sidebar-text {
  font-size: 13px;
  color: rgba(232,244,253,0.3);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.history-sidebar-time {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: rgba(79,195,247,0.15);
  flex-shrink: 0;
}

/* Guide */
.guide {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.6s, transform 0.6s;
}
.guide.hidden {
  opacity: 0;
  transform: translateY(12px);
}
.guide.visible {
  opacity: 1;
  transform: translateY(0);
}
.guide-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: rgba(79,195,247,0.4);
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}
.guide-text {
  font-size: 13px;
  color: rgba(232,244,253,0.3);
  line-height: 1.8;
}
.guide-text .cmd {
  color: var(--sao-blue);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="overlay-bg" id="overlayBg"></div>
<canvas id="magicCircle" width="1920" height="1080"></canvas>

<div class="chant-window" id="chantWindow">
  <div class="chant-header">
    <span class="chant-header-label">CHANT SYSTEM</span>
    <span class="chant-header-line"></span>
    <span class="chant-header-type" id="chantType">召喚</span>
  </div>
  <div class="chant-content">
    <div class="chant-body" id="chantBody"></div>
    <hr class="chant-divider" id="chantDivider">
    <div class="chant-words" id="chantWords"></div>
  </div>
</div>

<div class="history-sidebar" id="historySidebar">
  <div class="history-sidebar-title">CHANT LOG</div>
</div>

<div class="guide hidden" id="guide">
  <div class="guide-title">> CHAT COMMAND</div>
  <div class="guide-text"><span class="cmd">!word [単語]</span> を送信<br>例）<span class="cmd">!word 闇</span>　<span class="cmd">!word 覇</span>　<span class="cmd">!word 混沌</span></div>
</div>

<script>
const TYPE_CONFIG = {
  '召喚': { color: '#4FC3F7' },
  '解放': { color: '#00BCD4' },
  '封印': { color: '#7C4DFF' },
  '滅亡': { color: '#EF5350' },
  '覚醒': { color: '#B8952A' },
};

// Magic circle
const mcCanvas = document.getElementById('magicCircle');
const mcCtx = mcCanvas.getContext('2d');
let mcAnimating = false;
let mcAngle = 0;

function drawMagicCircle() {
  if (!mcAnimating) return;
  mcCtx.clearRect(0, 0, 1920, 1080);

  const cx = 960, cy = 594; // slightly below center (matches window position)
  const color = getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#4FC3F7';

  // Parse color for rgba
  mcCtx.strokeStyle = color;
  mcCtx.lineWidth = 1;
  mcCtx.globalAlpha = 0.12;

  // Outer circle (clockwise)
  mcCtx.save();
  mcCtx.translate(cx, cy);
  mcCtx.rotate(mcAngle);
  mcCtx.setLineDash([12, 8, 4, 8]);
  mcCtx.beginPath();
  mcCtx.arc(0, 0, 380, 0, Math.PI * 2);
  mcCtx.stroke();
  mcCtx.restore();

  // Inner circle (counter-clockwise)
  mcCtx.save();
  mcCtx.translate(cx, cy);
  mcCtx.rotate(-mcAngle * 0.7);
  mcCtx.setLineDash([6, 12, 20, 12]);
  mcCtx.beginPath();
  mcCtx.arc(0, 0, 320, 0, Math.PI * 2);
  mcCtx.stroke();
  mcCtx.restore();

  // Innermost circle (slow clockwise)
  mcCtx.save();
  mcCtx.translate(cx, cy);
  mcCtx.rotate(mcAngle * 0.3);
  mcCtx.setLineDash([2, 16]);
  mcCtx.globalAlpha = 0.08;
  mcCtx.beginPath();
  mcCtx.arc(0, 0, 260, 0, Math.PI * 2);
  mcCtx.stroke();
  mcCtx.restore();

  // Cross lines
  mcCtx.save();
  mcCtx.translate(cx, cy);
  mcCtx.rotate(mcAngle * 0.5);
  mcCtx.globalAlpha = 0.06;
  mcCtx.setLineDash([]);
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i;
    mcCtx.beginPath();
    mcCtx.moveTo(Math.cos(a) * 200, Math.sin(a) * 200);
    mcCtx.lineTo(Math.cos(a) * 380, Math.sin(a) * 380);
    mcCtx.stroke();
  }
  mcCtx.restore();

  mcCtx.globalAlpha = 1;
  mcCtx.setLineDash([]);
  mcAngle += 0.003;
  requestAnimationFrame(drawMagicCircle);
}

function startMagicCircle() {
  if (mcAnimating) return;
  mcAnimating = true;
  mcCanvas.classList.add('visible');
  drawMagicCircle();
}

function stopMagicCircle() {
  mcAnimating = false;
  mcCanvas.classList.remove('visible');
  setTimeout(() => mcCtx.clearRect(0, 0, 1920, 1080), 800);
}

// Guide
const guideEl = document.getElementById('guide');
let guideEnabled = localStorage.getItem('show_guide') !== 'false';
let chantActive = false;

function updateGuide() {
  if (guideEnabled && !chantActive) {
    guideEl.classList.remove('hidden');
    guideEl.classList.add('visible');
  } else {
    guideEl.classList.remove('visible');
    guideEl.classList.add('hidden');
  }
}
setTimeout(updateGuide, 300);

// Chant display
let chantTimeout = null;

function showChant(text, type, words) {
  if (chantTimeout) { clearTimeout(chantTimeout); chantTimeout = null; }

  chantActive = true;
  updateGuide();

  const cfg = TYPE_CONFIG[type] || TYPE_CONFIG['召喚'];
  document.documentElement.style.setProperty('--color-accent', cfg.color);

  const bg = document.getElementById('overlayBg');
  const win = document.getElementById('chantWindow');
  const body = document.getElementById('chantBody');
  const typeEl = document.getElementById('chantType');
  const divider = document.getElementById('chantDivider');
  const wordsEl = document.getElementById('chantWords');

  // Reset
  body.innerHTML = '';
  divider.classList.remove('visible');
  wordsEl.classList.remove('visible');
  typeEl.textContent = type || '召喚';
  typeEl.style.color = cfg.color;

  // Split into lines
  const lines = text.split(/(?<=[。！\n])/).map(s => s.trim()).filter(Boolean);

  const lineEls = lines.map(line => {
    const el = document.createElement('div');
    el.className = 'chant-line';
    el.textContent = line;
    body.appendChild(el);
    return el;
  });

  // Set words
  if (words && words.length > 0) {
    wordsEl.innerHTML = 'WORDS: ' + words.map(w => `<span>${w}</span>`).join('');
  } else {
    wordsEl.innerHTML = '';
  }

  // Animate in
  bg.classList.add('visible');
  win.classList.add('visible');
  startMagicCircle();

  // Reveal lines
  lineEls.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), 400 + i * 600);
  });

  // Show words after all lines
  const wordsDelay = 400 + lines.length * 600 + 800;
  setTimeout(() => {
    divider.classList.add('visible');
    wordsEl.classList.add('visible');
  }, wordsDelay);

  // Hold then fade out
  const holdTime = 5000;
  chantTimeout = setTimeout(() => {
    win.classList.remove('visible');
    bg.classList.remove('visible');
    stopMagicCircle();

    chantTimeout = setTimeout(() => {
      body.innerHTML = '';
      divider.classList.remove('visible');
      wordsEl.classList.remove('visible');
      chantActive = false;
      updateGuide();
      chantTimeout = null;
    }, 800);
  }, wordsDelay + holdTime);
}

// History sidebar
function renderOverlayHistory() {
  const sidebar = document.getElementById('historySidebar');
  const titleEl = sidebar.querySelector('.history-sidebar-title');
  sidebar.innerHTML = '';
  sidebar.appendChild(titleEl);
  try {
    const history = JSON.parse(localStorage.getItem('chant_history') || '[]');
    history.forEach((entry, i) => {
      const item = document.createElement('div');
      item.className = 'history-sidebar-item';
      const time = new Date(entry.timestamp);
      const hh = String(time.getHours()).padStart(2, '0');
      const mm = String(time.getMinutes()).padStart(2, '0');
      item.innerHTML = `<span class="history-sidebar-num">${String(i + 1).padStart(2, '0')}</span><span class="history-sidebar-text">${escHtml(entry.text)}</span><span class="history-sidebar-time">${hh}:${mm}</span>`;
      sidebar.appendChild(item);
    });
  } catch {}
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderOverlayHistory();

// Listen for localStorage changes
window.addEventListener('storage', (e) => {
  if (e.key === 'show_guide') {
    guideEnabled = e.newValue !== 'false';
    updateGuide();
    return;
  }
  if (e.key === 'chant_history') { renderOverlayHistory(); return; }
  if (e.key !== 'chant_data' || !e.newValue) return;
  try {
    const data = JSON.parse(e.newValue);
    if (data.text) showChant(data.text, data.type, data.words);
  } catch {}
});
</script>
</body>
</html>
