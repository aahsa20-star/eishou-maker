<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱オーバーレイ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --color-main: #F0E6C8;
  --color-gold: #C8A84B;
  --color-blue: #7EB8D4;
  --color-red: #C84B4B;
  --color-purple: #9B7EC8;
  --color-bg: rgba(8, 8, 20, 0.88);
  --color-border: rgba(200, 168, 75, 0.6);
  --color-accent: var(--color-gold);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* Scanlines */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 10;
}

/* Vignette */
.vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.5s;
  box-shadow: inset 0 0 200px rgba(0,0,0,0.7);
}
.vignette.visible { opacity: 1; }

/* Chant Window */
.chant-window {
  position: fixed;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  width: 70%;
  max-width: 900px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: 2px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.05),
    0 0 40px rgba(200, 168, 75, 0.15),
    0 0 80px rgba(0, 0, 0, 0.5);
  padding: 32px 40px 28px;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-window.visible { opacity: 1; }

.chant-type {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 20px;
  color: var(--color-accent);
  opacity: 0.7;
}

.chant-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
}

.chant-line {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--color-main);
  line-height: 1.8;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s ease-out, transform 0.2s ease-out;
}
.chant-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.chant-divider {
  border: none;
  border-top: 1px solid rgba(200, 168, 75, 0.2);
  margin: 16px 0 12px;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-divider.visible { opacity: 1; }

.chant-words {
  font-size: 13px;
  color: rgba(240, 230, 200, 0.4);
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.3s;
}
.chant-words.visible { opacity: 1; }
.chant-words span {
  margin-right: 12px;
}

/* History Sidebar */
.history-sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 24px 20px;
  z-index: 0;
  pointer-events: none;
}
.history-sidebar-title {
  font-size: 12px;
  font-weight: 700;
  color: rgba(240, 230, 200, 0.25);
  letter-spacing: 4px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(200, 168, 75, 0.15);
  margin-bottom: 12px;
}
.history-sidebar-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(200, 168, 75, 0.06);
  cursor: pointer;
}
.history-sidebar-num {
  font-size: 11px;
  color: rgba(200, 168, 75, 0.25);
  font-weight: 700;
  flex-shrink: 0;
  width: 20px;
}
.history-sidebar-text {
  font-size: 13px;
  color: rgba(240, 230, 200, 0.3);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.history-sidebar-time {
  font-size: 11px;
  color: rgba(240, 230, 200, 0.15);
  flex-shrink: 0;
}

/* Guide */
.guide {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.6s, transform 0.6s;
}
.guide.hidden {
  opacity: 0;
  transform: translateY(12px);
}
.guide.visible {
  opacity: 1;
  transform: translateY(0);
}
.guide-title {
  font-size: 12px;
  font-weight: 700;
  color: rgba(240, 230, 200, 0.35);
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.guide-text {
  font-size: 13px;
  color: rgba(240, 230, 200, 0.25);
  line-height: 1.8;
}
.guide-text .cmd {
  color: var(--color-blue);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="vignette" id="vignette"></div>

<div class="chant-window" id="chantWindow">
  <div class="chant-type" id="chantType"></div>
  <div class="chant-body" id="chantBody"></div>
  <hr class="chant-divider" id="chantDivider">
  <div class="chant-words" id="chantWords"></div>
</div>

<div class="history-sidebar" id="historySidebar">
  <div class="history-sidebar-title">詠唱履歴</div>
</div>

<div class="guide hidden" id="guide">
  <div class="guide-title">[ チャットで参加 ]</div>
  <div class="guide-text"><span class="cmd">!word 単語</span>　を送ってね<br>例）<span class="cmd">!word 闇</span>　<span class="cmd">!word 覇</span>　<span class="cmd">!word 混沌</span></div>
</div>

<script>
const TYPE_CONFIG = {
  '召喚': { icon: '⚡', color: '#C8A84B' },
  '解放': { icon: '🔓', color: '#7EB8D4' },
  '封印': { icon: '🔒', color: '#9B7EC8' },
  '滅亡': { icon: '💀', color: '#C84B4B' },
  '覚醒': { icon: '👁', color: '#C8A84B' },
};

// Guide
const guideEl = document.getElementById('guide');
let guideEnabled = localStorage.getItem('show_guide') !== 'false';
let chantActive = false;

function updateGuide() {
  if (guideEnabled && !chantActive) {
    guideEl.classList.remove('hidden');
    guideEl.classList.add('visible');
  } else {
    guideEl.classList.remove('visible');
    guideEl.classList.add('hidden');
  }
}
setTimeout(updateGuide, 300);

// Chant display
let chantTimeout = null;

function showChant(text, type, words) {
  // Clear any pending animation
  if (chantTimeout) { clearTimeout(chantTimeout); chantTimeout = null; }

  chantActive = true;
  updateGuide();

  const cfg = TYPE_CONFIG[type] || TYPE_CONFIG['召喚'];
  document.documentElement.style.setProperty('--color-accent', cfg.color);

  const vignette = document.getElementById('vignette');
  const win = document.getElementById('chantWindow');
  const body = document.getElementById('chantBody');
  const typeEl = document.getElementById('chantType');
  const divider = document.getElementById('chantDivider');
  const wordsEl = document.getElementById('chantWords');

  // Reset
  body.innerHTML = '';
  divider.classList.remove('visible');
  wordsEl.classList.remove('visible');
  typeEl.textContent = `${cfg.icon}  ${type || '召喚'}`;
  typeEl.style.color = cfg.color;

  // Split into lines
  const lines = text.split(/(?<=[。！\n])/).map(s => s.trim()).filter(Boolean);

  const lineEls = lines.map(line => {
    const el = document.createElement('div');
    el.className = 'chant-line';
    el.textContent = line;
    body.appendChild(el);
    return el;
  });

  // Set words
  if (words && words.length > 0) {
    wordsEl.innerHTML = '使用単語：' + words.map(w => `<span>${w}</span>`).join('');
  } else {
    wordsEl.innerHTML = '';
  }

  // Animate in
  vignette.classList.add('visible');
  win.classList.add('visible');

  // Reveal lines
  const timeouts = [];
  lineEls.forEach((el, i) => {
    timeouts.push(setTimeout(() => el.classList.add('visible'), 400 + i * 600));
  });

  // Show words after all lines
  const wordsDelay = 400 + lines.length * 600 + 800;
  timeouts.push(setTimeout(() => {
    divider.classList.add('visible');
    wordsEl.classList.add('visible');
  }, wordsDelay));

  // Hold then fade out
  const holdTime = 5000;
  chantTimeout = setTimeout(() => {
    win.classList.remove('visible');
    vignette.classList.remove('visible');

    chantTimeout = setTimeout(() => {
      body.innerHTML = '';
      divider.classList.remove('visible');
      wordsEl.classList.remove('visible');
      chantActive = false;
      updateGuide();
      chantTimeout = null;
    }, 500);
  }, wordsDelay + holdTime);
}

// History sidebar
function renderOverlayHistory() {
  const sidebar = document.getElementById('historySidebar');
  const titleEl = sidebar.querySelector('.history-sidebar-title');
  sidebar.innerHTML = '';
  sidebar.appendChild(titleEl);
  try {
    const history = JSON.parse(localStorage.getItem('chant_history') || '[]');
    history.forEach((entry, i) => {
      const item = document.createElement('div');
      item.className = 'history-sidebar-item';
      const time = new Date(entry.timestamp);
      const hh = String(time.getHours()).padStart(2, '0');
      const mm = String(time.getMinutes()).padStart(2, '0');
      item.innerHTML = `<span class="history-sidebar-num">${String(i + 1).padStart(2, '0')}</span><span class="history-sidebar-text">${escHtml(entry.text)}</span><span class="history-sidebar-time">${hh}:${mm}</span>`;
      sidebar.appendChild(item);
    });
  } catch {}
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderOverlayHistory();

// Listen for localStorage changes
window.addEventListener('storage', (e) => {
  if (e.key === 'show_guide') {
    guideEnabled = e.newValue !== 'false';
    updateGuide();
    return;
  }
  if (e.key === 'chant_history') { renderOverlayHistory(); return; }
  if (e.key !== 'chant_data' || !e.newValue) return;
  try {
    const data = JSON.parse(e.newValue);
    if (data.text) showChant(data.text, data.type, data.words);
  } catch {}
});
</script>
</body>
</html>
