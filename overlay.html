<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱オーバーレイ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --fg-base:     #E8DFC8;
  --fg-dim:      #A09070;
  --gold:        #A07830;
  --gold-bright: #C8A050;
  --teal:        #5A8A80;
  --bg-dark:     #0E0C09;
  --border:      #2A2418;
  --border-gold: rgba(160,120,48,0.4);
  --color-accent: var(--gold);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
vercel-live-feedback, [data-vercel-toolbar] { display: none !important; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* Background overlay */
.overlay-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, rgba(14,12,9,0.85) 0%, rgba(14,12,9,0.95) 100%);
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.6s;
}
.overlay-bg.visible { opacity: 1; }

/* Decorative line */
.deco-line {
  position: fixed;
  top: 28%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  transition: opacity 0.8s;
}
.deco-line.visible { opacity: 1; }
.deco-line-bar {
  width: 120px;
  height: 1px;
  background: var(--border-gold);
}
.deco-line-diamond {
  width: 6px;
  height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* Chant Window */
.chant-window {
  position: fixed;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  width: 65%;
  max-width: 820px;
  background: rgba(19,17,13,0.95);
  border: 1px solid var(--border-gold);
  border-radius: 0;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  padding: 0;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.6s;
  position: relative;
}
.chant-window.visible { opacity: 1; }

/* Corner decorations */
.chant-window::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 16px; height: 16px;
  border-top: 2px solid var(--gold);
  border-left: 2px solid var(--gold);
  z-index: 6;
}
.chant-window::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 16px; height: 16px;
  border-bottom: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
  z-index: 6;
}

.chant-header {
  display: flex;
  align-items: center;
  padding: 12px 28px;
  border-bottom: 1px solid var(--border);
}
.chant-header-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
  letter-spacing: 0.15em;
}
.chant-header-line {
  flex: 1;
  height: 1px;
  background: var(--border);
  margin: 0 16px;
}
.chant-header-type {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--color-accent);
}

.chant-content {
  padding: 28px 36px 24px;
}

.chant-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
}

.chant-line {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--fg-base);
  line-height: 2;
  text-align: center;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
}
.chant-line.visible {
  opacity: 1;
  transform: translateY(0);
}

.chant-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0 12px;
  opacity: 0;
  transition: opacity 0.4s;
}
.chant-divider.visible { opacity: 1; }

.chant-words {
  font-size: 13px;
  color: var(--fg-dim);
  letter-spacing: 1px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.4s;
}
.chant-words.visible { opacity: 1; }
.chant-words span { margin: 0 6px; }

/* History Sidebar */
.history-sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 24px 20px;
  z-index: 0;
  pointer-events: none;
  border-left: 1px solid var(--border-gold);
  background: rgba(14,12,9,0.5);
}
.history-sidebar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
  letter-spacing: 0.2em;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.history-sidebar-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,36,24,0.5);
}
.history-sidebar-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  color: rgba(160,120,48,0.4);
  font-weight: 600;
  flex-shrink: 0;
  width: 20px;
}
.history-sidebar-text {
  font-size: 13px;
  color: rgba(232,223,200,0.3);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.history-sidebar-time {
  font-size: 11px;
  color: rgba(160,144,112,0.3);
  flex-shrink: 0;
}

/* Guide */
.guide {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.6s, transform 0.6s;
}
.guide.hidden {
  opacity: 0;
  transform: translateY(12px);
}
.guide.visible {
  opacity: 1;
  transform: translateY(0);
}
.guide-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.guide-text {
  font-size: 13px;
  color: rgba(160,144,112,0.5);
  line-height: 1.8;
}
.guide-text .cmd {
  color: var(--teal);
  font-weight: 700;
}
</style>
</head>
<body>
<div class="overlay-bg" id="overlayBg"></div>

<div class="deco-line" id="decoLine">
  <span class="deco-line-bar"></span>
  <span class="deco-line-diamond"></span>
  <span class="deco-line-bar"></span>
</div>

<div class="chant-window" id="chantWindow">
  <div class="chant-header">
    <span class="chant-header-label">Chant System</span>
    <span class="chant-header-line"></span>
    <span class="chant-header-type" id="chantType">召喚</span>
  </div>
  <div class="chant-content">
    <div class="chant-body" id="chantBody"></div>
    <hr class="chant-divider" id="chantDivider">
    <div class="chant-words" id="chantWords"></div>
  </div>
</div>

<div class="history-sidebar" id="historySidebar">
  <div class="history-sidebar-title">Chant Log</div>
</div>

<div class="guide hidden" id="guide">
  <div class="guide-title">— チャットで参加 —</div>
  <div class="guide-text"><span class="cmd">!word 単語</span> を送ってね<br>例）<span class="cmd">!word 闇</span>　<span class="cmd">!word 覇</span>　<span class="cmd">!word 混沌</span></div>
</div>

<script>
const TYPE_CONFIG = {
  '召喚': { color: '#A07830' },
  '解放': { color: '#5A8A80' },
  '封印': { color: '#6A5A8A' },
  '滅亡': { color: '#7A3030' },
  '覚醒': { color: '#5A7A5A' },
};

// Guide
const guideEl = document.getElementById('guide');
let guideEnabled = localStorage.getItem('show_guide') !== 'false';
let chantActive = false;

function updateGuide() {
  if (guideEnabled && !chantActive) {
    guideEl.classList.remove('hidden');
    guideEl.classList.add('visible');
  } else {
    guideEl.classList.remove('visible');
    guideEl.classList.add('hidden');
  }
}
setTimeout(updateGuide, 300);

// Chant display
let chantTimeout = null;

function showChant(text, type, words) {
  if (chantTimeout) { clearTimeout(chantTimeout); chantTimeout = null; }

  chantActive = true;
  updateGuide();

  const cfg = TYPE_CONFIG[type] || TYPE_CONFIG['召喚'];
  document.documentElement.style.setProperty('--color-accent', cfg.color);

  const bg = document.getElementById('overlayBg');
  const deco = document.getElementById('decoLine');
  const win = document.getElementById('chantWindow');
  const body = document.getElementById('chantBody');
  const typeEl = document.getElementById('chantType');
  const divider = document.getElementById('chantDivider');
  const wordsEl = document.getElementById('chantWords');

  // Reset
  body.innerHTML = '';
  divider.classList.remove('visible');
  wordsEl.classList.remove('visible');
  typeEl.textContent = type || '召喚';
  typeEl.style.color = cfg.color;

  const lines = text.split(/(?<=[。！\n])/).map(s => s.trim()).filter(Boolean);

  const lineEls = lines.map(line => {
    const el = document.createElement('div');
    el.className = 'chant-line';
    el.textContent = line;
    body.appendChild(el);
    return el;
  });

  if (words && words.length > 0) {
    wordsEl.innerHTML = words.map(w => `<span>${w}</span>`).join('');
  } else {
    wordsEl.innerHTML = '';
  }

  // Animate in
  bg.classList.add('visible');
  deco.classList.add('visible');
  setTimeout(() => win.classList.add('visible'), 200);

  // Reveal lines
  lineEls.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), 600 + i * 600);
  });

  const wordsDelay = 600 + lines.length * 600 + 800;
  setTimeout(() => {
    divider.classList.add('visible');
    wordsEl.classList.add('visible');
  }, wordsDelay);

  // Hold then fade out
  const holdTime = 5000;
  chantTimeout = setTimeout(() => {
    win.classList.remove('visible');
    deco.classList.remove('visible');
    bg.classList.remove('visible');

    chantTimeout = setTimeout(() => {
      body.innerHTML = '';
      divider.classList.remove('visible');
      wordsEl.classList.remove('visible');
      chantActive = false;
      updateGuide();
      chantTimeout = null;
    }, 700);
  }, wordsDelay + holdTime);
}

// History sidebar
function renderOverlayHistory() {
  const sidebar = document.getElementById('historySidebar');
  const titleEl = sidebar.querySelector('.history-sidebar-title');
  sidebar.innerHTML = '';
  sidebar.appendChild(titleEl);
  try {
    const history = JSON.parse(localStorage.getItem('chant_history') || '[]');
    history.forEach((entry, i) => {
      const item = document.createElement('div');
      item.className = 'history-sidebar-item';
      const time = new Date(entry.timestamp);
      const hh = String(time.getHours()).padStart(2, '0');
      const mm = String(time.getMinutes()).padStart(2, '0');
      item.innerHTML = `<span class="history-sidebar-num">${String(i + 1).padStart(2, '0')}</span><span class="history-sidebar-text">${escHtml(entry.text)}</span><span class="history-sidebar-time">${hh}:${mm}</span>`;
      sidebar.appendChild(item);
    });
  } catch {}
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderOverlayHistory();

window.addEventListener('storage', (e) => {
  if (e.key === 'show_guide') {
    guideEnabled = e.newValue !== 'false';
    updateGuide();
    return;
  }
  if (e.key === 'chant_history') { renderOverlayHistory(); return; }
  if (e.key !== 'chant_data' || !e.newValue) return;
  try {
    const data = JSON.parse(e.newValue);
    if (data.text) showChant(data.text, data.type, data.words);
  } catch {}
});
</script>
</body>
</html>
