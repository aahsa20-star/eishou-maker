<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱オーバーレイ</title>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --fg-base:     #E8DFC8;
  --fg-dim:      #A09070;
  --gold:        #A07830;
  --gold-bright: #C8A050;
  --teal:        #5A8A80;
  --bg-dark:     #0E0C09;
  --border:      #2A2418;
  --border-gold: rgba(160,120,48,0.4);
  --color-accent: var(--gold);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
vercel-live-feedback, [data-vercel-toolbar] { display: none !important; }
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}

/* Background overlay */
.overlay-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, rgba(14,12,9,0.85) 0%, rgba(14,12,9,0.95) 100%);
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.6s;
}
.overlay-bg.visible { opacity: 1; }

/* Decorative line */
.deco-line {
  position: fixed;
  top: 28%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  transition: opacity 0.8s;
}
.deco-line.visible { opacity: 1; }
.deco-line-bar {
  width: 120px;
  height: 1px;
  background: var(--border-gold);
}
.deco-line-diamond {
  width: 6px;
  height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* Chant Window */
.chant-window {
  position: fixed;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  width: 65%;
  max-width: 820px;
  background: rgba(19,17,13,0.95);
  border: 1px solid rgba(160,120,48,0.7);
  border-radius: 0;
  box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 30px rgba(160,120,48,0.08);
  padding: 0;
  z-index: 5;
  clip-path: inset(0 0 100% 0);
  transition: clip-path 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.chant-window.visible { clip-path: inset(0 0 0% 0); }

/* Corner decorations */
.chant-window::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 16px; height: 16px;
  border-top: 2px solid #C8A050;
  border-left: 2px solid #C8A050;
  z-index: 6;
}
.chant-window::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 16px; height: 16px;
  border-bottom: 2px solid #C8A050;
  border-right: 2px solid #C8A050;
  z-index: 6;
}

.chant-header {
  display: flex;
  align-items: center;
  padding: 12px 28px;
  border-bottom: 1px solid rgba(160,120,48,0.5);
}
.chant-header-label {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--fg-dim);
  letter-spacing: 0.15em;
}
.chant-header-line {
  flex: 1;
  height: 1px;
  background: var(--border);
  margin: 0 16px;
}
.chant-header-type {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--color-accent);
}

.chant-content {
  padding: 28px 36px 24px;
}

.chant-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
}

.chant-line {
  font-family: 'Yuji Syuku', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--fg-base);
  line-height: 2.2;
  text-align: center;
  opacity: 0;
  position: relative;
}

.chant-line::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 40px;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(200,160,80,0.4));
  opacity: 0;
  pointer-events: none;
}

.chant-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0 12px;
  opacity: 0;
  transition: opacity 0.4s;
}
.chant-divider.visible { opacity: 1; }

.chant-words {
  font-size: 14px;
  color: var(--fg-dim);
  letter-spacing: 1px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.4s;
}
.chant-words.visible { opacity: 1; }

.chant-eval {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 8px 0 4px;
  opacity: 0;
  transition: opacity 0.4s;
}
.chant-eval.visible { opacity: 1; }
.chant-eval-element {
  font-size: 14px;
  font-weight: 700;
  padding: 2px 10px;
  color: #fff;
  letter-spacing: 0.1em;
}
.chant-eval-power {
  font-size: 16px;
  color: var(--gold-bright);
  letter-spacing: 2px;
}
.chant-eval-rarity {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
}
.chant-words span { margin: 0 6px; }

/* History Sidebar */
.history-sidebar {
  position: fixed;
  top: 0; right: 0;
  width: 320px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 24px 20px;
  z-index: 0;
  pointer-events: none;
  border-left: 1px solid var(--border-gold);
  background: rgba(14,12,9,0.5);
}
.history-sidebar-title {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--fg-dim);
  letter-spacing: 0.2em;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.history-sidebar-item {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,36,24,0.5);
}
.history-sidebar-num {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px;
  color: rgba(160,120,48,0.4);
  font-weight: 600;
  flex-shrink: 0;
  width: 20px;
}
.history-sidebar-text {
  font-family: 'Yuji Syuku', serif;
  font-size: 15px;
  color: rgba(232,223,200,0.3);
  line-height: 1.5;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.history-sidebar-time {
  font-size: 11px;
  color: rgba(160,144,112,0.3);
  flex-shrink: 0;
}

/* Countdown Overlay */
.countdown-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0);
  z-index: 100;
  pointer-events: none;
  transition: background 0.5s;
}
.countdown-overlay.active {
  background: rgba(0,0,0,0.6);
}
.countdown-number {
  font-family: 'Yuji Syuku', serif;
  font-size: 220px;
  font-weight: 700;
  color: var(--gold-bright);
  opacity: 0;
  position: absolute;
}
.countdown-label {
  font-family: 'Yuji Syuku', serif;
  font-size: 60px;
  font-weight: 700;
  color: var(--fg-base);
  opacity: 0;
  position: absolute;
}

/* Guide */
.guide {
  position: fixed;
  left: 24px;
  bottom: 24px;
  z-index: 0;
  pointer-events: none;
  transition: opacity 0.6s, transform 0.6s;
}
.guide.hidden {
  opacity: 0;
  transform: translateY(12px);
}
.guide.visible {
  opacity: 1;
  transform: translateY(0);
}
.guide-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.guide-text {
  font-size: 15px;
  color: rgba(160,144,112,0.5);
  line-height: 1.8;
}
.guide-text .cmd {
  color: var(--teal);
  font-weight: 700;
}

/* Vote Ranking */
.vote-ranking {
  position: fixed;
  left: 24px;
  bottom: 160px;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s;
}
.vote-ranking.visible { opacity: 1; }
.vote-ranking-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.vote-ranking-item {
  font-size: 13px;
  color: rgba(160,144,112,0.5);
  line-height: 1.8;
}
.vote-ranking-item .rank { color: var(--gold); font-weight: 600; margin-right: 6px; }
.vote-ranking-item .votes { color: var(--gold-bright); margin-left: 8px; font-size: 11px; }

/* Odai Display */
.odai-display {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s;
  text-align: center;
}
.odai-display.visible { opacity: 1; }
.odai-display-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.2em;
  margin-bottom: 4px;
}
.odai-display-text {
  font-family: 'Yuji Syuku', serif;
  font-size: 28px;
  color: var(--gold-bright);
  letter-spacing: 0.1em;
  text-shadow: 0 0 12px rgba(200,160,80,0.3);
}

/* Chain Counter */
.chain-counter {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s;
  text-align: right;
}
.chain-counter.visible { opacity: 1; }
.chain-counter-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.chain-counter-num {
  font-size: 22px;
  color: var(--gold-bright);
  font-weight: 700;
  letter-spacing: 0.05em;
}

/* MVP Display */
.mvp-display {
  position: fixed;
  left: 24px;
  bottom: 120px;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s;
}
.mvp-display.visible { opacity: 1; }
.mvp-display-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.mvp-display-name {
  font-size: 13px;
  color: rgba(200,160,80,0.6);
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="overlay-bg" id="overlayBg"></div>

<div class="deco-line" id="decoLine">
  <span class="deco-line-bar"></span>
  <span class="deco-line-diamond"></span>
  <span class="deco-line-bar"></span>
</div>

<div class="countdown-overlay" id="countdownOverlay">
  <div class="countdown-number" id="countdownNumber"></div>
  <div class="countdown-label" id="countdownLabel">——詠唱——</div>
</div>

<div class="chant-window" id="chantWindow">
  <div class="chant-header">
    <span class="chant-header-label">詠唱システム</span>
    <span class="chant-header-line"></span>
    <span class="chant-header-type" id="chantType">召喚</span>
  </div>
  <div class="chant-content">
    <div class="chant-body" id="chantBody"></div>
    <hr class="chant-divider" id="chantDivider">
    <div class="chant-words" id="chantWords"></div>
    <div class="chant-eval" id="chantEval"></div>
  </div>
</div>

<div class="history-sidebar" id="historySidebar">
  <div class="history-sidebar-title">詠唱記録</div>
</div>

<div class="odai-display" id="odaiDisplay"></div>
<div class="chain-counter" id="chainCounter"></div>
<div class="vote-ranking" id="voteRanking"></div>
<div class="mvp-display" id="mvpDisplay"></div>

<div class="guide hidden" id="guide">
  <div class="guide-title">チャットで参加</div>
  <div class="guide-text"><span class="cmd">!word 単語</span> を送ってね<br>例）<span class="cmd">!word 闇</span>　<span class="cmd">!word 覇</span>　<span class="cmd">!word 混沌</span></div>
</div>

<script>
// ── Sound Engine ──
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.reverbNode = null;
    this.enabled = localStorage.getItem('se_enabled') !== 'false';
    this.volume = parseFloat(localStorage.getItem('se_volume') ?? '0.5');
  }
  init() {
    if (this.ctx) { this.ctx.resume(); return; }
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = this.enabled ? this.volume : 0;
    this.masterGain.connect(this.ctx.destination);
    const len = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(2, len, this.ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
    this.reverbNode = this.ctx.createConvolver();
    this.reverbNode.buffer = buf;
    this.reverbNode.connect(this.masterGain);
  }
  setVolume(v) {
    this.volume = v;
    if (this.masterGain) this.masterGain.gain.value = this.enabled ? v : 0;
  }
  setEnabled(b) {
    this.enabled = b;
    if (this.masterGain) this.masterGain.gain.value = b ? this.volume : 0;
  }
  _osc(freq, type, dur, gain, env, opts = {}) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (opts.freqEnd) o.frequency.exponentialRampToValueAtTime(opts.freqEnd, t + dur);
    if (opts.detune) o.detune.value = opts.detune;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + (env.a || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    if (opts.reverb && this.reverbNode) {
      const rg = this.ctx.createGain();
      rg.gain.value = opts.reverbMix || 0.3;
      g.connect(rg);
      rg.connect(this.reverbNode);
    }
    g.connect(this.masterGain);
    o.start(t);
    o.stop(t + dur + 0.05);
  }
  _noise(dur, gain, filterFreq, filterType = 'lowpass', opts = {}) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = this.ctx.createBufferSource();
    s.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + (opts.attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const f = this.ctx.createBiquadFilter();
    f.type = filterType;
    f.frequency.value = filterFreq;
    if (opts.Q) f.Q.value = opts.Q;
    s.connect(f);
    f.connect(g);
    if (opts.reverb && this.reverbNode) {
      const rg = this.ctx.createGain();
      rg.gain.value = 0.2;
      g.connect(rg);
      rg.connect(this.reverbNode);
    }
    g.connect(this.masterGain);
    s.start(t);
    s.stop(t + dur);
  }

  // 詠唱開始：儀式の低音ドローン
  ritualStart(type) {
    this.init();
    const bases = { '召喚': 80, '解放': 100, '封印': 60, '滅亡': 50, '覚醒': 90 };
    const base = bases[type] || 80;
    this._osc(base, 'sine', 3, 0.25, { a: 0.3 }, { freqEnd: base * 2.5, reverb: true, reverbMix: 0.5 });
    this._osc(base * 0.5, 'sine', 3.5, 0.12, { a: 0.5 }, { reverb: true });
    this._noise(2.5, 0.07, 300, 'lowpass', { attack: 0.5, reverb: true });
    this._osc(base * 12, 'sine', 2, 0.03, { a: 0.8 }, { delay: 0.5, reverb: true, reverbMix: 0.6 });
  }
  // 詠唱行出現：段階的に高まるチャイム
  lineReveal(index, total) {
    this.init();
    const progress = index / Math.max(total - 1, 1);
    const base = 500 + progress * 500;
    const gain = 0.15 + progress * 0.1;
    this._osc(base, 'sine', 0.7, gain, { a: 0.01 }, { reverb: true, reverbMix: 0.4 + progress * 0.3 });
    this._osc(base * 1.5, 'triangle', 0.4, gain * 0.4, { a: 0.03 }, { delay: 0.02, reverb: true });
    if (index > 0) {
      this._osc(base * 2, 'sine', 0.3, gain * 0.15, { a: 0.05 }, { delay: 0.05, reverb: true });
    }
  }
  // 詠唱完成：衝撃波
  chantComplete(type) {
    this.init();
    const bases = { '召喚': 70, '解放': 90, '封印': 50, '滅亡': 40, '覚醒': 80 };
    const base = bases[type] || 70;
    this._osc(base, 'sine', 2.5, 0.35, { a: 0.005 }, { reverb: true, reverbMix: 0.6 });
    this._osc(base * 0.5, 'sine', 3, 0.15, { a: 0.01 }, { reverb: true });
    this._noise(1.5, 0.12, 400, 'lowpass', { attack: 0.005, reverb: true });
    this._osc(1500, 'sine', 2, 0.04, { a: 0.1 }, { delay: 0.1, reverb: true, reverbMix: 0.7 });
    this._osc(2000, 'sine', 1.5, 0.02, { a: 0.2 }, { delay: 0.2, reverb: true });
  }
  // 詠唱消滅：溶けていく音
  chantFade() {
    this.init();
    this._osc(400, 'sine', 1.5, 0.08, { a: 0.01 }, { freqEnd: 150, reverb: true, reverbMix: 0.6 });
    this._noise(1, 0.03, 800, 'bandpass', { attack: 0.01, reverb: true });
  }
}
const sfx = new SoundEngine();

// Vote Ranking
function renderVoteRanking(ranking) {
  const el = document.getElementById('voteRanking');
  if (!ranking || ranking.length === 0) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  const rankLabels = ['1位', '2位', '3位'];
  el.innerHTML = `<div class="vote-ranking-title">人気単語</div>` +
    ranking.map((r, i) => `<div class="vote-ranking-item"><span class="rank">${rankLabels[i]}</span>${r.word}<span class="votes">▲${r.votes}</span></div>`).join('');
  el.classList.add('visible');
}

// Chain Counter
function renderChainCounter(data) {
  const el = document.getElementById('chainCounter');
  if (!data || !data.chainCount || data.chainCount < 2) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `<div class="chain-counter-label">連続詠唱</div><div class="chain-counter-num">\u{1F517} \u00D7 ${data.chainCount}</div>`;
  el.classList.add('visible');
  // アニメーション
  const numEl = el.querySelector('.chain-counter-num');
  if (numEl) {
    numEl.animate([
      { transform: 'scale(1)' },
      { transform: 'scale(1.3)' },
      { transform: 'scale(1)' }
    ], { duration: 400, easing: 'ease-out' });
  }
}

// Odai Display
function renderOdaiDisplay(data) {
  const el = document.getElementById('odaiDisplay');
  if (!data || !data.text) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `<div class="odai-display-label">お題</div><div class="odai-display-text">${data.text}</div>`;
  el.classList.add('visible');
}

// MVP Display
function renderMvpDisplay(data) {
  const el = document.getElementById('mvpDisplay');
  if (!data || !data.username) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `<div class="mvp-display-title">MVP</div><div class="mvp-display-name">\u{1F451} ${data.username}</div>`;
  el.classList.add('visible');
}

// 初期表示
try { renderVoteRanking(JSON.parse(localStorage.getItem('vote_ranking') || '[]')); } catch {}
try { renderMvpDisplay(JSON.parse(localStorage.getItem('mvp_data') || 'null')); } catch {}
try { renderOdaiDisplay(JSON.parse(localStorage.getItem('odai_data') || 'null')); } catch {}
try { renderChainCounter(JSON.parse(localStorage.getItem('chain_data') || 'null')); } catch {}

const TYPE_CONFIG = {
  '召喚': { color: '#A07830' },
  '解放': { color: '#5A8A80' },
  '封印': { color: '#6A5A8A' },
  '滅亡': { color: '#7A3030' },
  '覚醒': { color: '#5A7A5A' },
};

// Guide
const guideEl = document.getElementById('guide');
let guideEnabled = localStorage.getItem('show_guide') !== 'false';
let chantActive = false;

function updateGuide() {
  if (guideEnabled && !chantActive) {
    guideEl.classList.remove('hidden');
    guideEl.classList.add('visible');
  } else {
    guideEl.classList.remove('visible');
    guideEl.classList.add('hidden');
  }
}
setTimeout(updateGuide, 300);

// Chant display
let chantTimeout = null;

const OV_ELEMENT_COLORS = {
  '闇': '#6A3A8A', '光': '#C8A050', '炎': '#C84B4B', '氷': '#4B8AC8', '雷': '#C8C04B',
  '風': '#4BC8A0', '土': '#8A6A3A', '無': '#888888', '混沌': '#8A3A6A', '神聖': '#C8B87A'
};
const OV_RARITY_COLORS = {
  'コモン': '#888888', 'アンコモン': '#4B8A4B', 'レア': '#4B6AC8',
  'スーパーレア': '#8A4BC8', 'レジェンド': '#C8A050'
};

function showChant(text, type, words, evaluation) {
  if (chantTimeout) { clearTimeout(chantTimeout); chantTimeout = null; }

  chantActive = true;
  updateGuide();

  const cfg = TYPE_CONFIG[type] || TYPE_CONFIG['召喚'];
  document.documentElement.style.setProperty('--color-accent', cfg.color);

  const bg = document.getElementById('overlayBg');
  const deco = document.getElementById('decoLine');
  const win = document.getElementById('chantWindow');
  const body = document.getElementById('chantBody');
  const typeEl = document.getElementById('chantType');
  const divider = document.getElementById('chantDivider');
  const wordsEl = document.getElementById('chantWords');
  const evalEl = document.getElementById('chantEval');

  // Reset
  body.innerHTML = '';
  divider.classList.remove('visible');
  wordsEl.classList.remove('visible');
  evalEl.classList.remove('visible');
  evalEl.innerHTML = '';
  typeEl.textContent = type || '召喚';
  typeEl.style.color = cfg.color;

  // タイプラベル：一瞬大きく表示→定位置に縮小
  const typeElAnim = document.getElementById('chantType');
  typeElAnim.animate([
    { fontSize: '48px', opacity: 0.8, offset: 0 },
    { fontSize: '16px', opacity: 1, offset: 1 }
  ], {
    duration: 400,
    easing: 'ease-in',
    fill: 'forwards',
    delay: 300
  });

  const lines = text.split(/(?<=[。！\n])/).map(s => s.trim()).filter(Boolean);
  const lineEls = lines.map(line => {
    const el = document.createElement('div');
    el.className = 'chant-line';
    // 一文字ずつspanに分割
    line.split('').forEach(ch => {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.opacity = '0';
      span.style.display = 'inline-block';
      span.style.transition = 'opacity 0.15s ease-in';
      el.appendChild(span);
    });
    body.appendChild(el);
    return el;
  });

  if (words && words.length > 0) {
    wordsEl.innerHTML = words.map(w => `<span>${w}</span>`).join('');
  } else {
    wordsEl.innerHTML = '';
  }

  // Animate in
  bg.classList.add('visible');
  deco.classList.add('visible');
  setTimeout(() => {
    win.classList.add('visible');
    win.animate([
      { clipPath: 'inset(0 0 100% 0)', opacity: 0.8 },
      { clipPath: 'inset(0 0 0% 0)', opacity: 1 }
    ], { duration: 500, easing: 'cubic-bezier(0.4, 0, 0.1, 1)', fill: 'forwards' });
  }, 200);

  // Reveal lines
  const charDelay = 60; // 1文字あたり60ms
  let cumulativeStart = 700;
  lineEls.forEach((el, i) => {
    const chars = el.querySelectorAll('span');
    const lineStart = cumulativeStart;
    cumulativeStart += chars.length * charDelay + 400;
    setTimeout(() => {
      el.style.opacity = '1';
      chars.forEach((ch, ci) => {
        setTimeout(() => {
          ch.style.opacity = '1';
          ch.style.textShadow = '0 0 12px rgba(200,160,80,0.6)';
          // 発光を徐々に消す
          setTimeout(() => { ch.style.textShadow = ''; ch.style.transition = 'text-shadow 0.5s'; }, 200);
        }, ci * charDelay);
      });
      sfx.lineReveal(i, lineEls.length);
    }, lineStart);
  });

  // 全行の表示完了時間を計算
  const totalLineTime = cumulativeStart + 800;

  setTimeout(() => {
    divider.classList.add('visible');
    wordsEl.classList.add('visible');
    if (evaluation) {
      const ec = OV_ELEMENT_COLORS[evaluation.element] || '#888';
      const rc = OV_RARITY_COLORS[evaluation.rarity] || '#888';
      const stars = '★'.repeat(evaluation.power || 0) + '☆'.repeat(5 - (evaluation.power || 0));
      evalEl.innerHTML = `<span class="chant-eval-element" style="background:${ec}">${evaluation.element}</span><span class="chant-eval-power">${stars}</span><span class="chant-eval-rarity" style="color:${rc}">${evaluation.rarity}</span>`;
      evalEl.classList.add('visible');
    }
    sfx.chantComplete(type || '召喚');
  }, totalLineTime);

  // Hold then fade out
  const holdTime = totalLineTime + 5000;
  chantTimeout = setTimeout(() => {
    win.classList.remove('visible');
    deco.classList.remove('visible');
    bg.classList.remove('visible');
    sfx.chantFade();

    chantTimeout = setTimeout(() => {
      body.innerHTML = '';
      divider.classList.remove('visible');
      wordsEl.classList.remove('visible');
      lineEls.forEach(el => { el.style.opacity = '0'; el.style.clipPath = ''; });
      chantActive = false;
      updateGuide();
      chantTimeout = null;
    }, 700);
  }, holdTime);
}

// History sidebar
function renderOverlayHistory() {
  const sidebar = document.getElementById('historySidebar');
  const titleEl = sidebar.querySelector('.history-sidebar-title');
  sidebar.innerHTML = '';
  sidebar.appendChild(titleEl);
  try {
    const history = JSON.parse(localStorage.getItem('chant_history') || '[]');
    history.forEach((entry, i) => {
      const item = document.createElement('div');
      item.className = 'history-sidebar-item';
      const time = new Date(entry.timestamp);
      const hh = String(time.getHours()).padStart(2, '0');
      const mm = String(time.getMinutes()).padStart(2, '0');
      item.innerHTML = `<span class="history-sidebar-num">${String(i + 1).padStart(2, '0')}</span><span class="history-sidebar-text">${escHtml(entry.text)}</span><span class="history-sidebar-time">${hh}:${mm}</span>`;
      sidebar.appendChild(item);
    });
  } catch {}
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderOverlayHistory();

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runCountdown(type) {
  const overlay = document.getElementById('countdownOverlay');
  const numEl = document.getElementById('countdownNumber');
  const labelEl = document.getElementById('countdownLabel');

  // Type-specific colors
  const typeColors = {
    '召喚': '#C8A050', '解放': '#7AB8B0', '封印': '#8A7AA0',
    '滅亡': '#A05050', '覚醒': '#7A9A7A'
  };
  const color = typeColors[type] || '#C8A050';
  numEl.style.color = color;
  labelEl.style.color = color;

  // Darken background
  overlay.style.pointerEvents = 'auto';
  overlay.classList.add('active');

  await sleep(500);

  // Count: 3, 2, 1
  for (const num of ['3', '2', '1']) {
    numEl.textContent = num;
    numEl.style.opacity = '1';
    // Brush stroke: top to bottom
    numEl.animate([
      { clipPath: 'inset(0 0 100% 0)', opacity: 0.8 },
      { clipPath: 'inset(0 0 0% 0)', opacity: 1 }
    ], { duration: 600, easing: 'cubic-bezier(0.2, 0, 0.1, 1)', fill: 'forwards' });

    // SE: low pitched tone for each count
    sfx.init();
    sfx._osc(220, 'sine', 0.5, 0.15, { a: 0.005 }, { reverb: true, reverbMix: 0.5 });
    sfx._osc(330, 'triangle', 0.35, 0.08, { a: 0.02 }, { delay: 0.02, reverb: true });

    await sleep(800);
    // Slide up and fade out
    numEl.animate([
      { opacity: 1, transform: 'translateY(0)' },
      { opacity: 0, transform: 'translateY(-30px)' }
    ], { duration: 300, fill: 'forwards' });
    await sleep(300);
  }

  // Show "——詠唱——"
  labelEl.style.opacity = '1';
  labelEl.animate([
    { clipPath: 'inset(0 100% 0 0)', opacity: 0.8 },
    { clipPath: 'inset(0 0% 0 0)', opacity: 1 }
  ], { duration: 500, easing: 'cubic-bezier(0.2, 0, 0.1, 1)', fill: 'forwards' });

  sfx.ritualStart(type);

  await sleep(1000);
  // Fade out label
  labelEl.animate([
    { opacity: 1 },
    { opacity: 0 }
  ], { duration: 300, fill: 'forwards' });
  await sleep(300);

  // Clean up
  overlay.classList.remove('active');
  overlay.style.pointerEvents = 'none';
  numEl.style.opacity = '0';
  labelEl.style.opacity = '0';
}

// 重複排除用（storageとBroadcastChannelの二重受信を防ぐ）
let lastCountdownTs = 0;
let lastChantTs = 0;

// メッセージ処理（storage / BroadcastChannel共通）
function handleOverlayMessage(key, value) {
  if (key === 'se_enabled') { sfx.setEnabled(value !== 'false' && value !== false); return; }
  if (key === 'se_volume') { sfx.setVolume(parseFloat(value || '0.5')); return; }
  if (key === 'show_guide') { guideEnabled = value !== 'false' && value !== false; updateGuide(); return; }
  if (key === 'chant_history') { renderOverlayHistory(); return; }
  if (key === 'vote_ranking') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      renderVoteRanking(Array.isArray(data) ? data : []);
    } catch {} return;
  }
  if (key === 'mvp_data') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      renderMvpDisplay(data);
    } catch {} return;
  }
  if (key === 'odai_data') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      renderOdaiDisplay(data);
    } catch {} return;
  }
  if (key === 'chain_data') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      renderChainCounter(data);
    } catch {} return;
  }
  if (key === 'countdown_data') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      if (data.state === 'counting' && data.timestamp !== lastCountdownTs) {
        lastCountdownTs = data.timestamp;
        runCountdown(data.type || '召喚');
      }
    } catch (err) { console.error('countdown処理エラー:', err); }
    return;
  }
  if (key === 'chant_data') {
    try {
      const data = typeof value === 'object' ? value : JSON.parse(value);
      if (data.text && data.timestamp !== lastChantTs) {
        lastChantTs = data.timestamp;
        showChant(data.text, data.type, data.words, data.evaluation);
      }
    } catch (err) { console.error('chant_data処理エラー:', err); }
  }
}

// localStorage storageイベント
window.addEventListener('storage', (e) => {
  if (e.newValue != null) handleOverlayMessage(e.key, e.newValue);
});

// BroadcastChannel（バックアップ通信）
const overlayChannel = new BroadcastChannel('eishou_overlay');
overlayChannel.onmessage = (e) => {
  handleOverlayMessage(e.data.key, e.data.data);
};

// OBSブラウザソース向けポーリング（1秒ごと）
let pollCache = {};
setInterval(() => {
  const keys = ['se_enabled', 'se_volume', 'show_guide', 'vote_ranking', 'mvp_data', 'odai_data', 'chain_data'];
  for (const key of keys) {
    const val = localStorage.getItem(key);
    if (val !== pollCache[key]) {
      pollCache[key] = val;
      if (val != null) handleOverlayMessage(key, val);
    }
  }
}, 1000);
</script>
