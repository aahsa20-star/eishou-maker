<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sao-blue:     #4FC3F7;
  --sao-blue-dim: #1A5F7A;
  --sao-teal:     #00BCD4;
  --sao-white:    #E8F4FD;
  --sao-gold:     #B8952A;
  --sao-red:      #EF5350;
  --sao-purple:   #7C4DFF;
  --bg-dark:      #030A14;
  --bg-panel:     rgba(4, 20, 40, 0.85);
  --border-glow:  rgba(79, 195, 247, 0.4);
  --border-dim:   rgba(79, 195, 247, 0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
vercel-live-feedback, [data-vercel-toolbar] { display: none !important; }
body {
  background: var(--bg-dark);
  background-image:
    linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  color: var(--sao-white);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  background: rgba(3, 10, 20, 0.95);
  border-bottom: 1px solid var(--border-dim);
  flex-wrap: wrap;
}
.header h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--sao-blue);
  letter-spacing: 0.05em;
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header h1::before {
  content: '';
  display: block;
  width: 2px;
  height: 28px;
  background: var(--sao-blue);
  box-shadow: 0 0 8px var(--sao-blue);
}
.header h1 .sub {
  font-size: 11px;
  font-weight: 500;
  color: rgba(79,195,247,0.4);
  letter-spacing: 0.15em;
  margin-left: 8px;
}
.header input {
  background: rgba(4, 20, 40, 0.8);
  border: 1px solid var(--border-dim);
  color: var(--sao-white);
  padding: 8px 14px;
  border-radius: 0;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.header input:focus {
  border-color: var(--sao-blue);
  box-shadow: 0 0 8px rgba(79,195,247,0.2);
}
.header input.channel-input { width: 180px; }
.header button {
  background: transparent;
  color: var(--sao-blue);
  border: 1px solid var(--sao-blue-dim);
  padding: 8px 18px;
  border-radius: 0;
  font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.1em;
}
.header button:hover {
  border-color: var(--sao-blue);
  box-shadow: 0 0 10px rgba(79,195,247,0.2);
}
.status {
  font-size: 12px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 0;
  color: var(--sao-red);
  letter-spacing: 0.1em;
  animation: blink-status 1s ease-in-out infinite;
}
@keyframes blink-status {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.status.connected {
  color: var(--sao-teal);
  animation: none;
}

/* Main Layout */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px 24px;
  max-height: calc(100vh - 220px);
}

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-glow);
  border-radius: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
  box-shadow: 0 0 20px rgba(79,195,247,0.05), inset 0 0 20px rgba(79,195,247,0.02);
}
.panel-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--sao-blue);
  margin-bottom: 12px;
  letter-spacing: 0.15em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before {
  content: '';
  display: block;
  width: 16px;
  height: 2px;
  background: var(--sao-blue);
  box-shadow: 0 0 6px var(--sao-blue);
}

/* Word Cards */
.word-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  overflow-y: auto;
  max-height: 45vh;
  align-content: flex-start;
}
.word-card {
  background: rgba(79,195,247,0.08);
  border: 1px solid rgba(79,195,247,0.3);
  border-radius: 0;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  user-select: none;
}
.word-card:hover {
  background: rgba(79,195,247,0.15);
  box-shadow: 0 0 8px rgba(79,195,247,0.3);
}
.word-card .word-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--sao-white);
}
.word-card .word-count {
  font-size: 11px;
  color: rgba(79,195,247,0.5);
  margin-top: 2px;
}
.word-card.hot {
  border-color: var(--sao-blue);
  background: rgba(79,195,247,0.15);
  box-shadow: 0 0 12px rgba(79,195,247,0.2);
}

/* Manual Input */
.manual-input {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.manual-input input {
  flex: 1;
  background: rgba(4, 20, 40, 0.8);
  border: 1px solid var(--border-dim);
  color: var(--sao-white);
  padding: 10px 14px;
  border-radius: 0;
  font-size: 16px;
  font-family: inherit;
  outline: none;
}
.manual-input input:focus {
  border-color: var(--sao-blue);
  box-shadow: 0 0 8px rgba(79,195,247,0.2);
}
.manual-input button {
  background: transparent;
  color: var(--sao-blue);
  border: 1px solid var(--sao-blue-dim);
  padding: 10px 20px;
  border-radius: 0;
  font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.1em;
}
.manual-input button:hover {
  border-color: var(--sao-blue);
  box-shadow: 0 0 8px rgba(79,195,247,0.2);
}

/* Selected Area */
.selected-area {
  background: var(--bg-panel);
  border: 1px solid var(--border-glow);
  border-radius: 0;
  padding: 16px 20px;
  margin: 16px 24px;
  min-height: 80px;
  clip-path: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  box-shadow: 0 0 20px rgba(79,195,247,0.05);
}
.selected-area .panel-title { margin-bottom: 10px; }
.selected-words {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 40px;
}
.selected-word {
  background: rgba(79,195,247,0.1);
  border: 1px solid rgba(79,195,247,0.4);
  border-radius: 0;
  padding: 8px 14px;
  font-size: 16px;
  font-weight: 700;
  color: var(--sao-white);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: grab;
  transition: all 0.2s;
  user-select: none;
}
.selected-word:active { cursor: grabbing; }
.selected-word .remove {
  color: rgba(79,195,247,0.5);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  transition: color 0.2s;
}
.selected-word .remove:hover { color: var(--sao-red); }
.selected-word.drag-over {
  border-color: var(--sao-blue);
  box-shadow: 0 0 12px rgba(79,195,247,0.4);
}
.placeholder-text {
  color: rgba(79,195,247,0.3);
  font-size: 14px;
  padding: 8px;
}

/* Generate Button */
.btn-generate {
  background: transparent;
  color: var(--sao-blue);
  border: 2px solid var(--sao-blue);
  padding: 14px 40px;
  border-radius: 0;
  font-size: 18px;
  font-weight: 700;
  font-family: 'Rajdhani', sans-serif;
  cursor: pointer;
  letter-spacing: 0.3em;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(79,195,247,0.2);
}
.btn-generate:hover {
  background: rgba(79,195,247,0.1);
  box-shadow: 0 0 30px rgba(79,195,247,0.4);
}
.btn-generate:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  box-shadow: none;
}

/* Type Selector & Toggles */
.type-selector {
  display: flex;
  gap: 6px;
  padding: 0 24px 16px;
  align-items: center;
}
.type-btn {
  flex: 1;
  background: transparent;
  color: rgba(79,195,247,0.5);
  border: 1px solid var(--sao-blue-dim);
  padding: 10px 8px;
  border-radius: 0;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  letter-spacing: 0.1em;
}
.type-btn:hover {
  border-color: var(--sao-blue);
  color: var(--sao-white);
}
.type-btn.active {
  background: rgba(79,195,247,0.15);
  border-color: var(--sao-blue);
  color: var(--sao-white);
  box-shadow: 0 0 10px rgba(79,195,247,0.3);
}
.type-btn.active[data-type="召喚"] { border-color: var(--sao-blue); box-shadow: 0 0 10px rgba(79,195,247,0.3); }
.type-btn.active[data-type="解放"] { border-color: var(--sao-teal); color: var(--sao-teal); box-shadow: 0 0 10px rgba(0,188,212,0.3); background: rgba(0,188,212,0.1); }
.type-btn.active[data-type="封印"] { border-color: var(--sao-purple); color: var(--sao-purple); box-shadow: 0 0 10px rgba(124,77,255,0.3); background: rgba(124,77,255,0.1); }
.type-btn.active[data-type="滅亡"] { border-color: var(--sao-red); color: var(--sao-red); box-shadow: 0 0 10px rgba(239,83,80,0.3); background: rgba(239,83,80,0.1); }
.type-btn.active[data-type="覚醒"] { border-color: var(--sao-gold); color: var(--sao-gold); box-shadow: 0 0 10px rgba(184,149,42,0.3); background: rgba(184,149,42,0.1); }

.speech-toggle {
  background: transparent;
  color: rgba(79,195,247,0.4);
  border: 1px solid var(--sao-blue-dim);
  padding: 10px 14px;
  border-radius: 0;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.1em;
}
.speech-toggle:hover {
  border-color: var(--sao-blue);
  color: rgba(79,195,247,0.7);
}
.speech-toggle.active {
  background: transparent;
  color: var(--sao-blue);
  border-color: var(--sao-blue);
}
.btn-clear {
  background: transparent;
  color: rgba(79,195,247,0.4);
  border: 1px solid var(--sao-blue-dim);
  padding: 10px 20px;
  border-radius: 0;
  font-size: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.1em;
}
.btn-clear:hover { border-color: var(--sao-blue); color: rgba(79,195,247,0.7); }

/* Generate Area */
.generate-area {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 0 24px 8px;
  gap: 16px;
  flex-wrap: wrap;
}
.rate-info {
  text-align: right;
  padding: 0 24px 20px;
  font-size: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  color: var(--sao-blue);
  letter-spacing: 0.05em;
}
.rate-info.warning { color: #FFB74D; }
.rate-info.danger { color: var(--sao-red); }

/* Result Preview */
.result-preview {
  margin: 0 24px 20px;
  padding: 20px;
  background: var(--bg-panel);
  border: 1px solid var(--border-glow);
  border-radius: 0;
  display: none;
  clip-path: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  box-shadow: 0 0 20px rgba(79,195,247,0.05);
}
.result-preview.visible { display: block; }
.result-text {
  font-size: 18px;
  line-height: 2;
  color: var(--sao-white);
  text-align: center;
  white-space: pre-wrap;
}
.result-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.btn-copy {
  background: transparent;
  color: rgba(79,195,247,0.6);
  border: 1px solid var(--sao-blue-dim);
  padding: 6px 16px;
  border-radius: 0;
  font-size: 13px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.1em;
}
.btn-copy:hover {
  border-color: var(--sao-blue);
  color: var(--sao-blue);
}
.btn-copy.copied {
  border-color: var(--sao-teal);
  color: var(--sao-teal);
}

/* History */
.history-area {
  margin: 0 24px 20px;
}
.history-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.history-card {
  background: var(--bg-panel);
  border: 1px solid var(--border-dim);
  border-radius: 0;
  padding: 14px 18px;
  transition: border-color 0.2s;
}
.history-card:hover { border-color: var(--border-glow); }
.history-chant {
  font-size: 14px;
  color: var(--sao-white);
  line-height: 1.8;
  white-space: pre-wrap;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.history-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.history-tag {
  background: rgba(79,195,247,0.1);
  color: rgba(79,195,247,0.6);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 0;
}
.history-time {
  font-size: 11px;
  font-family: 'Rajdhani', sans-serif;
  color: rgba(79,195,247,0.3);
  margin-left: auto;
}
.history-actions {
  display: flex;
  gap: 6px;
  margin-left: 8px;
}
.history-btn {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 0;
  border: 1px solid var(--sao-blue-dim);
  background: transparent;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.history-btn.replay {
  color: rgba(79,195,247,0.5);
}
.history-btn.replay:hover { border-color: var(--sao-blue); color: var(--sao-blue); }
.history-btn.delete {
  color: rgba(239,83,80,0.5);
}
.history-btn.delete:hover { border-color: var(--sao-red); color: var(--sao-red); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.2); border-radius: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>詠唱メーカー <span class="sub">CHANT SYSTEM v1.0</span></h1>
  <input class="channel-input" id="channel" placeholder="Twitchチャンネル名">
  <button id="connectBtn" onclick="toggleConnect()">接続</button>
  <span class="status" id="status">OFFLINE</span>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-title">投稿された単語</div>
    <div class="word-grid" id="wordGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">手動追加</div>
    <div class="manual-input">
      <input id="manualWord" placeholder="単語を入力..." onkeydown="if(event.key==='Enter')addManualWord()">
      <button onclick="addManualWord()">追加</button>
    </div>
    <div class="panel-title" style="margin-top:16px">ヒント</div>
    <p style="color:rgba(79,195,247,0.4);font-size:13px;line-height:1.8">
      チャットに <code style="color:var(--sao-blue)">!word 単語</code> で投稿された単語が左に表示されます。<br>
      クリックで選択 → 下の並び替えエリアへ → 詠唱生成
    </p>
  </div>
</div>

<div class="selected-area">
  <div class="panel-title">選択済み単語（ドラッグで並び替え）</div>
  <div class="selected-words" id="selectedWords">
    <span class="placeholder-text">単語をクリックして追加...</span>
  </div>
</div>

<div class="type-selector">
  <button class="type-btn active" data-type="召喚" onclick="selectType(this)">召喚</button>
  <button class="type-btn" data-type="解放" onclick="selectType(this)">解放</button>
  <button class="type-btn" data-type="封印" onclick="selectType(this)">封印</button>
  <button class="type-btn" data-type="滅亡" onclick="selectType(this)">滅亡</button>
  <button class="type-btn" data-type="覚醒" onclick="selectType(this)">覚醒</button>
  <button class="speech-toggle active" id="speechToggle" onclick="toggleSpeech()">読み上げ</button>
  <button class="speech-toggle active" id="guideToggle" onclick="toggleGuide()">参加説明</button>
</div>

<div class="generate-area">
  <button class="btn-clear" onclick="clearSelected()">CLEAR</button>
  <button class="btn-generate" id="generateBtn" onclick="generate()">CHANT</button>
</div>
<div class="rate-info" id="rateInfo"></div>

<div class="result-preview" id="resultPreview">
  <div class="result-text" id="resultText"></div>
  <div class="result-actions">
    <button class="btn-copy" id="copyBtn" onclick="copyChant()">COPY</button>
  </div>
</div>

<div class="history-area">
  <div class="panel-title">CHANT LOG</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
// State
let words = {};
let selected = [];
let selectedType = '召喚';
let speechEnabled = true;
let ws = null;
let connected = false;

const savedChannel = localStorage.getItem('twitch_channel');
if (savedChannel) document.getElementById('channel').value = savedChannel;

// Twitch
function toggleConnect() {
  if (connected) { disconnect(); return; }
  const ch = document.getElementById('channel').value.trim().toLowerCase();
  if (!ch) return;
  localStorage.setItem('twitch_channel', ch);
  connect(ch);
}

function connect(channel) {
  const st = document.getElementById('status');
  const btn = document.getElementById('connectBtn');
  st.textContent = 'CONNECTING...';
  st.className = 'status';

  ws = new WebSocket('wss://irc-ws.chat.twitch.tv');
  ws.onopen = () => {
    ws.send('NICK justinfan12345');
    ws.send('JOIN #' + channel);
  };
  ws.onmessage = (e) => {
    const lines = e.data.split('\r\n');
    for (const line of lines) {
      if (line.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); continue; }
      if (line.includes('366')) {
        connected = true;
        st.textContent = 'ONLINE: #' + channel;
        st.className = 'status connected';
        btn.textContent = '切断';
      }
      const match = line.match(/PRIVMSG\s+#\S+\s+:!word\s+(.+)/i);
      if (match) {
        const w = match[1].trim().substring(0, 20);
        if (w) addWord(w);
      }
    }
  };
  ws.onclose = () => { disconnect(); };
  ws.onerror = () => { disconnect(); };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  connected = false;
  document.getElementById('status').textContent = 'OFFLINE';
  document.getElementById('status').className = 'status';
  document.getElementById('connectBtn').textContent = '接続';
}

// Words
function addWord(w) {
  words[w] = (words[w] || 0) + 1;
  renderWords();
}

function renderWords() {
  const grid = document.getElementById('wordGrid');
  const sorted = Object.entries(words).sort((a, b) => b[1] - a[1]);
  grid.innerHTML = '';
  for (const [w, count] of sorted) {
    const card = document.createElement('div');
    card.className = 'word-card' + (count >= 3 ? ' hot' : '');
    card.innerHTML = `<div class="word-text">${esc(w)}</div><div class="word-count">${count}票</div>`;
    card.onclick = () => selectWord(w);
    grid.appendChild(card);
  }
}

function addManualWord() {
  const input = document.getElementById('manualWord');
  const w = input.value.trim().substring(0, 20);
  if (!w) return;
  addWord(w);
  selectWord(w);
  input.value = '';
}

// Selection
function selectWord(w) {
  if (selected.includes(w)) return;
  selected.push(w);
  renderSelected();
}

function removeSelected(i) {
  selected.splice(i, 1);
  renderSelected();
}

function clearSelected() {
  selected = [];
  renderSelected();
  document.getElementById('resultPreview').classList.remove('visible');
}

let dragIdx = null;
function renderSelected() {
  const container = document.getElementById('selectedWords');
  if (selected.length === 0) {
    container.innerHTML = '<span class="placeholder-text">単語をクリックして追加...</span>';
    return;
  }
  container.innerHTML = '';
  selected.forEach((w, i) => {
    const el = document.createElement('div');
    el.className = 'selected-word';
    el.draggable = true;
    el.innerHTML = `<span>${esc(w)}</span><span class="remove" onclick="event.stopPropagation();removeSelected(${i})">&times;</span>`;
    el.addEventListener('dragstart', () => { dragIdx = i; el.style.opacity = '0.4'; });
    el.addEventListener('dragend', () => { el.style.opacity = '1'; });
    el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => { el.classList.remove('drag-over'); });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (dragIdx === null || dragIdx === i) return;
      const item = selected.splice(dragIdx, 1)[0];
      selected.splice(i, 0, item);
      renderSelected();
    });
    container.appendChild(el);
  });
}

// Rate limit
const RATE_MAX = 5;
const RATE_WINDOW = 3600000;

function getRateLogs() {
  try { return JSON.parse(localStorage.getItem('rate_limit_log') || '[]'); } catch { return []; }
}

function getActiveRateLogs() {
  const now = Date.now();
  return getRateLogs().filter(t => now - t < RATE_WINDOW);
}

function addRateLog() {
  const logs = [...getActiveRateLogs(), Date.now()];
  localStorage.setItem('rate_limit_log', JSON.stringify(logs));
  updateRateInfo();
}

function updateRateInfo() {
  const logs = getActiveRateLogs();
  const remaining = Math.max(0, RATE_MAX - logs.length);
  const el = document.getElementById('rateInfo');
  const btn = document.getElementById('generateBtn');

  let text = `残り ${remaining} / ${RATE_MAX} 回`;
  if (logs.length > 0 && remaining < RATE_MAX) {
    const oldest = Math.min(...logs);
    const resetAt = oldest + RATE_WINDOW;
    const minsLeft = Math.max(1, Math.ceil((resetAt - Date.now()) / 60000));
    text += `（${minsLeft}分後リセット）`;
  }

  el.textContent = text;
  el.className = 'rate-info' + (remaining <= 0 ? ' danger' : remaining <= 2 ? ' warning' : '');

  if (remaining <= 0) {
    btn.disabled = true;
    el.textContent = '残り 0 / 5 回 ― しばらく時間をおいてください';
  }
}

updateRateInfo();
setInterval(updateRateInfo, 30000);

// Generate
const API_URL = '/api/chant';

async function generate() {
  if (selected.length === 0) { alert('単語を選択してください'); return; }
  if (getActiveRateLogs().length >= RATE_MAX) { updateRateInfo(); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'LOADING...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: selected, type: selectedType })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const text = data.text;

    document.getElementById('resultText').textContent = text;
    document.getElementById('resultPreview').classList.add('visible');

    const ts = Date.now();
    localStorage.setItem('chant_data', JSON.stringify({ text, timestamp: ts, type: selectedType, words: [...selected] }));

    saveHistory({ text, words: [...selected], timestamp: ts });
    addRateLog();

    if (speechEnabled && 'speechSynthesis' in window) {
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.75;
      utterance.pitch = 0.8;
      utterance.volume = 1.0;
      utterance.onend = () => { btn.disabled = false; btn.textContent = 'CHANT'; updateRateInfo(); };
      utterance.onerror = () => { btn.disabled = false; btn.textContent = 'CHANT'; updateRateInfo(); };
      speechSynthesis.speak(utterance);
      return;
    }
  } catch (e) {
    alert('エラー: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = 'CHANT';
}

// History
function getHistory() {
  try { return JSON.parse(localStorage.getItem('chant_history') || '[]'); } catch { return []; }
}

function saveHistory(entry) {
  const history = [entry, ...getHistory()].slice(0, 5);
  localStorage.setItem('chant_history', JSON.stringify(history));
  renderHistory();
}

function deleteHistory(i) {
  const history = getHistory();
  history.splice(i, 1);
  localStorage.setItem('chant_history', JSON.stringify(history));
  renderHistory();
}

function replayChant(i) {
  const entry = getHistory()[i];
  if (!entry) return;
  localStorage.setItem('chant_data', JSON.stringify({ text: entry.text, timestamp: Date.now() }));
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const history = getHistory();
  if (history.length === 0) { list.innerHTML = '<span class="placeholder-text">NO DATA</span>'; return; }
  list.innerHTML = '';
  history.forEach((entry, i) => {
    const card = document.createElement('div');
    card.className = 'history-card';
    const time = new Date(entry.timestamp);
    const hh = String(time.getHours()).padStart(2, '0');
    const mm = String(time.getMinutes()).padStart(2, '0');
    const tags = (entry.words || []).map(w => `<span class="history-tag">${esc(w)}</span>`).join('');
    card.innerHTML = `<div class="history-chant">${esc(entry.text)}</div>
      <div class="history-meta">${tags}<span class="history-time">${hh}:${mm}</span>
      <div class="history-actions"><button class="history-btn replay" onclick="copyHistoryChant(${i}, this)">COPY</button><button class="history-btn replay" onclick="replayChant(${i})">REPLAY</button><button class="history-btn delete" onclick="deleteHistory(${i})">DEL</button></div></div>`;
    list.appendChild(card);
  });
}

function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
}

function toggleSpeech() {
  speechEnabled = !speechEnabled;
  document.getElementById('speechToggle').classList.toggle('active', speechEnabled);
}

let guideEnabled = localStorage.getItem('show_guide') !== 'false';
document.getElementById('guideToggle').classList.toggle('active', guideEnabled);

function toggleGuide() {
  guideEnabled = !guideEnabled;
  localStorage.setItem('show_guide', guideEnabled);
  document.getElementById('guideToggle').classList.toggle('active', guideEnabled);
}

function doCopy(text, btn) {
  const orig = btn.textContent;
  const showSuccess = () => {
    btn.textContent = 'DONE';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showSuccess).catch(() => {
      fallbackCopy(text);
      showSuccess();
    });
  } else {
    fallbackCopy(text);
    showSuccess();
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

function copyChant() {
  const text = document.getElementById('resultText').textContent;
  doCopy(text, document.getElementById('copyBtn'));
}

function copyHistoryChant(i, btn) {
  const entry = getHistory()[i];
  if (entry) doCopy(entry.text, btn);
}

renderHistory();

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
