<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>詠唱メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --fg-base:     #E8DFC8;
  --fg-dim:      #A09070;
  --gold:        #A07830;
  --gold-bright: #C8A050;
  --teal:        #5A8A80;
  --teal-dim:    #2A4A45;
  --bg-base:     #0E0C09;
  --bg-panel:    #13110D;
  --bg-input:    #0A0907;
  --border:      #2A2418;
  --border-gold: rgba(160,120,48,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
vercel-live-feedback, [data-vercel-toolbar] { display: none !important; }
body {
  background: var(--bg-base);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(90,138,128,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(160,120,48,0.03) 0%, transparent 60%);
  color: var(--fg-base);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 400;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 32px;
  background: rgba(14,12,9,0.95);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.header-title {
  margin-right: auto;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #C8A050 0%, #7AB8B0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.05em;
  filter: drop-shadow(0 0 8px rgba(200,160,80,0.4));
}
.header-line {
  width: 100%;
  height: 1px;
  background: var(--border-gold);
  order: 99;
}
.header input {
  background: var(--bg-input);
  border: 1px solid rgba(160,120,48,0.4);
  color: var(--fg-base);
  padding: 10px 14px;
  border-radius: 0;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.header input:focus { border-color: #C8A050; box-shadow: 0 0 8px rgba(160,120,48,0.2); }
.header input.channel-input { width: 180px; }
.header button {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--border);
  padding: 10px 18px;
  border-radius: 0;
  font-size: 16px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.1em;
}
.header button:hover { border-color: var(--gold); }
.status {
  font-size: 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  padding: 4px 10px;
  color: var(--fg-dim);
}
.status.connected { color: var(--teal); }

/* Main Layout */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px 32px;
}

.panel {
  background: linear-gradient(135deg, #13110D 0%, #0F1410 100%);
  border: 1px solid rgba(160,120,48,0.5);
  box-shadow: 0 0 0 1px rgba(160,120,48,0.1), inset 0 1px 0 rgba(255,255,255,0.03);
  border-radius: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.panel::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 20px; height: 20px;
  border-top: 2px solid #C8A050;
  border-left: 2px solid #C8A050;
}
.panel::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 20px; height: 20px;
  border-bottom: 2px solid #C8A050;
  border-right: 2px solid #C8A050;
}
.panel-title {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: #D4A84B;
  margin-bottom: 12px;
  letter-spacing: 0.15em;
  padding: 4px 12px;
  background: rgba(160,120,48,0.1);
  border-left: 3px solid var(--gold);
  text-shadow: 0 0 10px rgba(160,120,48,0.3);
}
.panel-title.teal { color: #7AB8B0; text-shadow: 0 0 10px rgba(90,138,128,0.3); border-left-color: #5A8A80; background: rgba(90,138,128,0.1); }
.panel-title.purple { color: #9A8AB0; text-shadow: 0 0 10px rgba(106,90,138,0.3); border-left-color: #6A5A8A; background: rgba(106,90,138,0.1); }

/* Word Cards */
.word-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  overflow-y: auto;
  max-height: 45vh;
  align-content: flex-start;
}
.word-card {
  background: rgba(160,120,48,0.06);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  user-select: none;
}
.word-card:hover {
  border-color: var(--border-gold);
  background: rgba(160,120,48,0.12);
}
.word-card .word-text {
  font-size: 18px;
  font-weight: 500;
  color: var(--fg-base);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.word-card .word-count {
  font-size: 11px;
  color: var(--fg-dim);
  margin-top: 2px;
}
.word-card.hot {
  border-color: var(--gold);
  background: rgba(160,120,48,0.12);
  box-shadow: 0 0 12px rgba(160,120,48,0.2);
}
.word-card.hot .word-text {
  text-shadow: 0 0 8px rgba(200,160,80,0.4), 0 1px 3px rgba(0,0,0,0.5);
}
.word-card .word-delete {
  position: absolute;
  top: 4px; right: 4px;
  width: 16px; height: 16px;
  background: none;
  border: none;
  color: var(--fg-dim);
  font-size: 14px;
  line-height: 16px;
  text-align: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  padding: 0;
  font-family: inherit;
}
.word-card:hover .word-delete { opacity: 1; }
.word-card .word-delete:hover { color: var(--fg-base); }
.word-card.removing {
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.15s, transform 0.15s;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.panel-header .panel-title { margin-bottom: 0; }
.btn-clear-words {
  background: none;
  border: none;
  color: var(--fg-dim);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  padding: 2px 6px;
  transition: color 0.2s;
}
.btn-clear-words:hover { color: var(--fg-base); }

/* Manual Input */
.manual-input {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.manual-input input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid rgba(160,120,48,0.4);
  color: var(--fg-base);
  padding: 12px 16px;
  border-radius: 0;
  font-size: 18px;
  font-family: inherit;
  outline: none;
}
.manual-input input:focus { border-color: #C8A050; box-shadow: 0 0 8px rgba(160,120,48,0.2); }
.manual-input button {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--border);
  padding: 12px 20px;
  border-radius: 0;
  font-size: 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.1em;
}
.manual-input button:hover { border-color: var(--gold); }

/* Selected Area */
.selected-area {
  background: linear-gradient(135deg, #13110D 0%, #0F1410 100%);
  border: 1px solid rgba(160,120,48,0.5);
  box-shadow: 0 0 0 1px rgba(160,120,48,0.1), inset 0 1px 0 rgba(255,255,255,0.03);
  border-radius: 0;
  padding: 20px 24px;
  margin: 20px 32px;
  min-height: 80px;
  position: relative;
}
.selected-area::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 20px; height: 20px;
  border-top: 2px solid #C8A050;
  border-left: 2px solid #C8A050;
}
.selected-area::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 20px; height: 20px;
  border-bottom: 2px solid #C8A050;
  border-right: 2px solid #C8A050;
}
.selected-area .panel-title { margin-bottom: 10px; }
.selected-words {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 40px;
}
.selected-word {
  background: rgba(160,120,48,0.08);
  border: 1px solid var(--border-gold);
  border-radius: 0;
  padding: 8px 14px;
  font-size: 18px;
  font-weight: 500;
  color: var(--fg-base);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: grab;
  transition: all 0.2s;
  user-select: none;
  text-shadow: 0 0 6px rgba(200,160,80,0.3), 0 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 0 10px rgba(160,120,48,0.1);
}
.selected-word:active { cursor: grabbing; }
.selected-word .remove {
  color: var(--fg-dim);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  transition: color 0.2s;
}
.selected-word .remove:hover { color: #7A3030; }
.selected-word.drag-over {
  border-color: var(--gold);
}
.placeholder-text {
  color: #3A3428;
  font-size: 14px;
  padding: 8px;
}

/* Generate Button */
.btn-generate {
  background: linear-gradient(135deg, rgba(160,120,48,0.2) 0%, rgba(90,138,128,0.1) 100%);
  color: #E8DFC8;
  border: 2px solid #C8A050;
  padding: 20px 48px;
  width: 100%;
  border-radius: 0;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 24px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.4em;
  transition: all 0.2s;
  text-shadow: 0 0 12px rgba(200,160,80,0.5), 0 0 24px rgba(200,160,80,0.2);
  box-shadow: 0 0 20px rgba(160,120,48,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
}
.btn-generate:hover {
  background: rgba(160,120,48,0.28);
  color: var(--fg-base);
  text-shadow: 0 0 16px rgba(200,160,80,0.7), 0 0 32px rgba(200,160,80,0.3);
  box-shadow: 0 0 30px rgba(160,120,48,0.3);
}
.btn-generate:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Type Selector & Toggles */
.type-selector {
  display: flex;
  gap: 8px;
  padding: 0 32px 12px;
  align-items: center;
  flex-wrap: wrap;
}
.type-btn {
  flex: 1;
  background: transparent;
  color: rgba(232,223,200,0.6);
  border: 1px solid rgba(160,120,48,0.35);
  padding: 12px 0;
  border-radius: 0;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 18px;
  text-shadow: 0 0 8px rgba(160,120,48,0.2);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  letter-spacing: 0.15em;
}
.type-btn:hover {
  border-color: var(--border-gold);
  color: var(--fg-base);
}
.type-btn[data-type="召喚"] { border-color: rgba(160,120,48,0.3); }
.type-btn[data-type="解放"] { border-color: rgba(90,138,128,0.3); }
.type-btn[data-type="封印"] { border-color: rgba(106,90,138,0.3); }
.type-btn[data-type="滅亡"] { border-color: rgba(122,48,48,0.3); }
.type-btn[data-type="覚醒"] { border-color: rgba(90,122,90,0.3); }
.type-btn.active {
  background: rgba(160,120,48,0.2);
  border: 2px solid #C8A050;
  color: #E8DFC8;
  text-shadow: 0 0 10px rgba(200,160,80,0.5);
  box-shadow: 0 0 12px rgba(160,120,48,0.25), inset 0 0 15px rgba(160,120,48,0.05);
}
.type-btn.active[data-type="解放"] { border: 2px solid var(--teal); color: var(--teal); background: rgba(90,138,128,0.12); text-shadow: 0 0 10px rgba(90,138,128,0.5); box-shadow: 0 0 12px rgba(90,138,128,0.25), inset 0 0 15px rgba(90,138,128,0.05); }
.type-btn.active[data-type="封印"] { border: 2px solid #6A5A8A; color: #8A7AA0; background: rgba(106,90,138,0.12); text-shadow: 0 0 10px rgba(106,90,138,0.5); box-shadow: 0 0 12px rgba(106,90,138,0.25), inset 0 0 15px rgba(106,90,138,0.05); }
.type-btn.active[data-type="滅亡"] { border: 2px solid #7A3030; color: #A05050; background: rgba(122,48,48,0.12); text-shadow: 0 0 10px rgba(122,48,48,0.5); box-shadow: 0 0 12px rgba(122,48,48,0.25), inset 0 0 15px rgba(122,48,48,0.05); }
.type-btn.active[data-type="覚醒"] { border: 2px solid #5A7A5A; color: #7A9A7A; background: rgba(90,122,90,0.12); text-shadow: 0 0 10px rgba(90,122,90,0.5); box-shadow: 0 0 12px rgba(90,122,90,0.25), inset 0 0 15px rgba(90,122,90,0.05); }
.controls-row {
  display: flex;
  gap: 8px;
  padding: 0 32px 16px;
  align-items: center;
}
.controls-row .btn-clear {
  margin-left: auto;
}

.speech-toggle {
  background: transparent;
  color: rgba(232,223,200,0.7);
  border: 1px solid rgba(160,120,48,0.4);
  padding: 12px 16px;
  border-radius: 0;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.speech-toggle:hover {
  border-color: var(--border-gold);
  color: var(--fg-base);
}
.speech-toggle.active {
  color: #E8DFC8;
  border-color: #C8A050;
  background: rgba(160,120,48,0.12);
  text-shadow: 0 0 8px rgba(160,120,48,0.4);
}
.se-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.se-volume {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 6px;
  background: var(--border);
  outline: none;
}
.se-volume::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--gold);
  cursor: pointer;
}
.se-volume::-moz-range-thumb {
  width: 16px;
  height: 16px;
  background: var(--gold);
  border: none;
  cursor: pointer;
}
.se-volume.disabled {
  opacity: 0.3;
  pointer-events: none;
}
.btn-clear {
  background: transparent;
  color: var(--fg-dim);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 0;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.btn-clear:hover { border-color: var(--border-gold); color: var(--fg-base); }

/* Generate Area */
.generate-area {
  padding: 0 32px 8px;
}
.rate-info {
  text-align: right;
  padding: 0 32px 20px;
  font-size: 15px;
  color: var(--fg-dim);
}
.rate-info.warning { color: var(--gold); }
.rate-info.danger { color: #7A3030; }

/* Result Preview */
.result-preview {
  margin: 0 32px 20px;
  padding: 20px;
  background: var(--bg-panel);
  border: 1px solid rgba(160,120,48,0.5);
  box-shadow: 0 0 0 1px rgba(160,120,48,0.1), inset 0 1px 0 rgba(255,255,255,0.03);
  border-radius: 0;
  display: none;
  position: relative;
}
.result-preview::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 20px; height: 20px;
  border-top: 2px solid #C8A050;
  border-left: 2px solid #C8A050;
}
.result-preview::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 20px; height: 20px;
  border-bottom: 2px solid #C8A050;
  border-right: 2px solid #C8A050;
}
.result-preview.visible { display: block; }
.result-text {
  font-family: 'Yuji Syuku', serif;
  font-size: 22px;
  font-weight: 600;
  line-height: 2;
  color: var(--fg-base);
  text-align: center;
  white-space: pre-wrap;
}
.result-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}
.btn-copy {
  background: transparent;
  color: var(--fg-dim);
  border: 1px solid var(--border);
  padding: 6px 16px;
  border-radius: 0;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-copy:hover { border-color: var(--border-gold); color: var(--gold); }
.btn-copy.copied { border-color: var(--teal); color: var(--teal); }

/* History */
.history-area { margin: 0 32px 20px; }
.history-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.history-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 14px 18px;
  transition: border-color 0.2s;
}
.history-card:hover { border-color: var(--border-gold); }
.history-chant {
  font-family: 'Yuji Syuku', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--fg-base);
  line-height: 1.9;
  white-space: pre-wrap;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.history-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.history-tag {
  background: rgba(160,120,48,0.08);
  color: var(--fg-dim);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 0;
}
.history-time {
  font-size: 11px;
  color: #4A4030;
  margin-left: auto;
}
.history-actions {
  display: flex;
  gap: 6px;
  margin-left: 8px;
}
.history-btn {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 0;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.history-btn.replay { color: var(--fg-dim); }
.history-btn.replay:hover { border-color: var(--border-gold); color: var(--gold); }
.history-btn.delete { color: #5A3A3A; }
.history-btn.delete:hover { border-color: #7A3030; color: #7A3030; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">詠唱メーカー</div>
  <input class="channel-input" id="channel" placeholder="Twitchチャンネル名">
  <button id="connectBtn" onclick="toggleConnect()">接続</button>
  <span class="status" id="status">未接続</span>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title teal">投稿された単語</div>
      <button class="btn-clear-words" id="clearWordsBtn" onclick="clearAllWords()" style="display:none">全削除</button>
    </div>
    <div class="word-grid" id="wordGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title gold">手動追加</div>
    <div class="manual-input">
      <input id="manualWord" placeholder="単語を入力..." onkeydown="if(event.key==='Enter')addManualWord()">
      <button onclick="addManualWord()">追加</button>
    </div>
    <div class="panel-title gold" style="margin-top:16px">ヒント</div>
    <p style="color:var(--fg-dim);font-size:15px;line-height:1.8">
      チャットに <code style="color:var(--teal)">!word 単語</code> で投稿された単語が左に表示されます。<br>
      クリックで選択 → 下の並び替えエリアへ → 詠唱生成
    </p>
  </div>
</div>

<div class="selected-area">
  <div class="panel-title teal">選択済み単語（ドラッグで並び替え）</div>
  <div class="selected-words" id="selectedWords">
    <span class="placeholder-text">単語をクリックして追加...</span>
  </div>
</div>

<div class="type-selector">
  <button class="type-btn active" data-type="召喚" onclick="selectType(this)">召喚</button>
  <button class="type-btn" data-type="解放" onclick="selectType(this)">解放</button>
  <button class="type-btn" data-type="封印" onclick="selectType(this)">封印</button>
  <button class="type-btn" data-type="滅亡" onclick="selectType(this)">滅亡</button>
  <button class="type-btn" data-type="覚醒" onclick="selectType(this)">覚醒</button>
</div>
<div class="controls-row">
  <button class="speech-toggle active" id="speechToggle" onclick="toggleSpeech()">読み上げ</button>
  <button class="speech-toggle active" id="guideToggle" onclick="toggleGuide()">参加説明</button>
  <div class="se-controls">
    <button class="speech-toggle active" id="seToggle" onclick="toggleSE()">効果音</button>
    <button class="speech-toggle active" id="bgmToggle" onclick="toggleBGM()">BGM</button>
    <input type="range" class="se-volume" id="seVolume" min="0" max="100" value="50" oninput="setSEVolume(this.value)">
  </div>
  <button class="btn-clear" onclick="clearSelected()">クリア</button>
</div>

<div class="generate-area">
  <button class="btn-generate" id="generateBtn" onclick="generate()">詠唱生成</button>
</div>
<div class="rate-info" id="rateInfo"></div>

<div class="result-preview" id="resultPreview">
  <div class="result-text" id="resultText"></div>
  <div class="result-actions">
    <button class="btn-copy" id="copyBtn" onclick="copyChant()">コピー</button>
  </div>
</div>

<div class="history-area">
  <div class="panel-title purple">詠唱履歴</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
// ── Sound Engine ──
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.reverbNode = null;
    this.enabled = localStorage.getItem('se_enabled') !== 'false';
    this.volume = parseFloat(localStorage.getItem('se_volume') ?? '0.5');
  }
  init() {
    if (this.ctx) { this.ctx.resume(); return; }
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = this.enabled ? this.volume : 0;
    this.masterGain.connect(this.ctx.destination);
    const len = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(2, len, this.ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
    this.reverbNode = this.ctx.createConvolver();
    this.reverbNode.buffer = buf;
    this.reverbNode.connect(this.masterGain);
  }
  setVolume(v) {
    this.volume = v;
    localStorage.setItem('se_volume', String(v));
    if (this.masterGain) this.masterGain.gain.value = this.enabled ? v : 0;
    this._updateBGMVolume();
  }
  setEnabled(b) {
    this.enabled = b;
    localStorage.setItem('se_enabled', String(b));
    if (this.masterGain) this.masterGain.gain.value = b ? this.volume : 0;
    this._updateBGMVolume();
    if (!b) this.stopBGM();
  }
  _osc(freq, type, dur, gain, env, opts = {}) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (opts.freqEnd) o.frequency.exponentialRampToValueAtTime(opts.freqEnd, t + dur);
    if (opts.detune) o.detune.value = opts.detune;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + (env.a || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    if (opts.reverb && this.reverbNode) {
      const rg = this.ctx.createGain();
      rg.gain.value = opts.reverbMix || 0.3;
      g.connect(rg);
      rg.connect(this.reverbNode);
    }
    g.connect(this.masterGain);
    o.start(t);
    o.stop(t + dur + 0.05);
  }
  _noise(dur, gain, filterFreq, filterType = 'lowpass', opts = {}) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + (opts.delay || 0);
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = this.ctx.createBufferSource();
    s.buffer = buf;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(gain, t + (opts.attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const f = this.ctx.createBiquadFilter();
    f.type = filterType;
    f.frequency.value = filterFreq;
    if (opts.Q) f.Q.value = opts.Q;
    s.connect(f);
    f.connect(g);
    if (opts.reverb && this.reverbNode) {
      const rg = this.ctx.createGain();
      rg.gain.value = 0.2;
      g.connect(rg);
      rg.connect(this.reverbNode);
    }
    g.connect(this.masterGain);
    s.start(t);
    s.stop(t + dur);
  }

  // 単語受信：星が降るようなきらめき
  wordReceived() {
    this.init();
    const base = 900 + Math.random() * 300;
    this._osc(base, 'sine', 0.35, 0.12, { a: 0.005 }, { reverb: true, reverbMix: 0.4 });
    this._osc(base * 1.5, 'sine', 0.25, 0.06, { a: 0.02 }, { delay: 0.03, reverb: true });
  }
  // 単語選択：魔法陣に宝石を置く音
  wordSelected() {
    this.init();
    this._osc(440, 'sine', 0.5, 0.15, { a: 0.005 }, { reverb: true, reverbMix: 0.5 });
    this._osc(660, 'triangle', 0.35, 0.08, { a: 0.02 }, { delay: 0.02, reverb: true });
    this._osc(220, 'sine', 0.4, 0.06, { a: 0.01 });
  }
  // 単語削除：消え去る音
  wordRemoved() {
    this.init();
    this._osc(600, 'sine', 0.2, 0.08, { a: 0.005 }, { freqEnd: 250 });
  }
  // 詠唱開始：儀式の始まり
  ritualStart(type) {
    this.init();
    const bases = { '召喚': 80, '解放': 100, '封印': 60, '滅亡': 50, '覚醒': 90 };
    const base = bases[type] || 80;
    this._osc(base, 'sine', 3, 0.2, { a: 0.3 }, { freqEnd: base * 2.5, reverb: true, reverbMix: 0.5 });
    this._osc(base * 0.5, 'sine', 3.5, 0.1, { a: 0.5 }, { reverb: true });
    this._noise(2.5, 0.06, 300, 'lowpass', { attack: 0.5, reverb: true });
    this._osc(base * 12, 'sine', 2, 0.03, { a: 0.8 }, { delay: 0.5, reverb: true, reverbMix: 0.6 });
  }
  // コピー確認音
  uiConfirm() {
    this.init();
    this._osc(800, 'sine', 0.15, 0.08, { a: 0.005 });
    this._osc(1200, 'sine', 0.15, 0.06, { a: 0.005 }, { delay: 0.08 });
  }

  // ── BGM（MP3ループ再生） ──
  startBGM() {
    if (this._bgmAudio) return;
    const audio = new Audio('/bgm/Moonlight_on_Vellum.mp3');
    audio.loop = true;
    audio.volume = this.enabled ? 0.3 * this.volume : 0;
    audio.play().catch(() => {});
    this._bgmAudio = audio;
  }
  stopBGM() {
    if (this._bgmAudio) {
      this._bgmAudio.pause();
      this._bgmAudio.currentTime = 0;
      this._bgmAudio = null;
    }
  }
  _updateBGMVolume() {
    if (this._bgmAudio) {
      this._bgmAudio.volume = this.enabled ? 0.3 * this.volume : 0;
    }
  }
}
const sfx = new SoundEngine();

let words = {};
let selected = [];
let selectedType = '召喚';
let speechEnabled = true;
let ws = null;
let connected = false;

const savedChannel = localStorage.getItem('twitch_channel');
if (savedChannel) document.getElementById('channel').value = savedChannel;

function toggleConnect() {
  if (connected) { disconnect(); return; }
  const ch = document.getElementById('channel').value.trim().toLowerCase();
  if (!ch) return;
  localStorage.setItem('twitch_channel', ch);
  connect(ch);
}

function connect(channel) {
  const st = document.getElementById('status');
  const btn = document.getElementById('connectBtn');
  st.textContent = '接続中...';
  st.className = 'status';

  ws = new WebSocket('wss://irc-ws.chat.twitch.tv');
  ws.onopen = () => {
    ws.send('NICK justinfan12345');
    ws.send('JOIN #' + channel);
  };
  ws.onmessage = (e) => {
    const lines = e.data.split('\r\n');
    for (const line of lines) {
      if (line.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); continue; }
      if (line.includes('366')) {
        connected = true;
        st.textContent = '接続中: #' + channel;
        st.className = 'status connected';
        btn.textContent = '切断';
      }
      const match = line.match(/PRIVMSG\s+#\S+\s+:!word\s+(.+)/i);
      if (match) {
        const w = match[1].trim().substring(0, 20);
        if (w) addWord(w);
      }
    }
  };
  ws.onclose = () => { disconnect(); };
  ws.onerror = () => { disconnect(); };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  connected = false;
  document.getElementById('status').textContent = '未接続';
  document.getElementById('status').className = 'status';
  document.getElementById('connectBtn').textContent = '接続';
}

function addWord(w) {
  sfx.wordReceived();
  words[w] = (words[w] || 0) + 1;
  renderWords();
}

function renderWords() {
  const grid = document.getElementById('wordGrid');
  const sorted = Object.entries(words).sort((a, b) => b[1] - a[1]);
  grid.innerHTML = '';
  document.getElementById('clearWordsBtn').style.display = sorted.length > 0 ? '' : 'none';
  for (const [w, count] of sorted) {
    const card = document.createElement('div');
    card.className = 'word-card' + (count >= 3 ? ' hot' : '');
    card.innerHTML = `<div class="word-text">${esc(w)}</div><div class="word-count">${count}票</div><button class="word-delete" onclick="event.stopPropagation();deleteWord('${esc(w).replace(/'/g, "\\'")}', this)">&times;</button>`;
    card.onclick = () => selectWord(w);
    grid.appendChild(card);
  }
}

function deleteWord(w, btn) {
  sfx.wordRemoved();
  const card = btn.closest('.word-card');
  card.classList.add('removing');
  setTimeout(() => {
    delete words[w];
    const idx = selected.indexOf(w);
    if (idx !== -1) { selected.splice(idx, 1); renderSelected(); }
    renderWords();
  }, 150);
}

function clearAllWords() {
  sfx.wordRemoved();
  const removedWords = Object.keys(words);
  words = {};
  selected = selected.filter(w => !removedWords.includes(w));
  renderSelected();
  renderWords();
}

function addManualWord() {
  const input = document.getElementById('manualWord');
  const w = input.value.trim().substring(0, 20);
  if (!w) return;
  addWord(w);
  selectWord(w);
  input.value = '';
}

function selectWord(w) {
  if (selected.includes(w)) return;
  sfx.wordSelected();
  selected.push(w);
  renderSelected();
}

function removeSelected(i) {
  sfx.wordRemoved();
  selected.splice(i, 1);
  renderSelected();
}

function clearSelected() {
  selected = [];
  renderSelected();
  document.getElementById('resultPreview').classList.remove('visible');
}

let dragIdx = null;
function renderSelected() {
  const container = document.getElementById('selectedWords');
  if (selected.length === 0) {
    container.innerHTML = '<span class="placeholder-text">単語をクリックして追加...</span>';
    return;
  }
  container.innerHTML = '';
  selected.forEach((w, i) => {
    const el = document.createElement('div');
    el.className = 'selected-word';
    el.draggable = true;
    el.innerHTML = `<span>${esc(w)}</span><span class="remove" onclick="event.stopPropagation();removeSelected(${i})">&times;</span>`;
    el.addEventListener('dragstart', () => { dragIdx = i; el.style.opacity = '0.4'; });
    el.addEventListener('dragend', () => { el.style.opacity = '1'; });
    el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => { el.classList.remove('drag-over'); });
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (dragIdx === null || dragIdx === i) return;
      const item = selected.splice(dragIdx, 1)[0];
      selected.splice(i, 0, item);
      renderSelected();
    });
    container.appendChild(el);
  });
}

const RATE_MAX = 5;
const RATE_WINDOW = 3600000;

function getRateLogs() {
  try { return JSON.parse(localStorage.getItem('rate_limit_log') || '[]'); } catch { return []; }
}
function getActiveRateLogs() {
  const now = Date.now();
  return getRateLogs().filter(t => now - t < RATE_WINDOW);
}
function addRateLog() {
  const logs = [...getActiveRateLogs(), Date.now()];
  localStorage.setItem('rate_limit_log', JSON.stringify(logs));
  updateRateInfo();
}
function updateRateInfo() {
  const logs = getActiveRateLogs();
  const remaining = Math.max(0, RATE_MAX - logs.length);
  const el = document.getElementById('rateInfo');
  const btn = document.getElementById('generateBtn');
  let text = `残り ${remaining} / ${RATE_MAX} 回`;
  if (logs.length > 0 && remaining < RATE_MAX) {
    const oldest = Math.min(...logs);
    const resetAt = oldest + RATE_WINDOW;
    const minsLeft = Math.max(1, Math.ceil((resetAt - Date.now()) / 60000));
    text += `（${minsLeft}分後リセット）`;
  }
  el.textContent = text;
  el.className = 'rate-info' + (remaining <= 0 ? ' danger' : remaining <= 2 ? ' warning' : '');
  if (remaining <= 0) {
    btn.disabled = true;
    el.textContent = '残り 0 / 5 回 ― しばらく時間をおいてください';
  }
}
updateRateInfo();
setInterval(updateRateInfo, 30000);

const API_URL = '/api/chant';

async function generate() {
  if (selected.length === 0) { alert('単語を選択してください'); return; }
  if (getActiveRateLogs().length >= RATE_MAX) { updateRateInfo(); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '準備中...';

  // カウントダウン開始をoverlayに通知
  localStorage.setItem('countdown_data', JSON.stringify({
    state: 'counting',
    type: selectedType,
    timestamp: Date.now()
  }));

  // カウントダウン待機（3カウント + 詠唱ラベル = 約4秒）
  await new Promise(r => setTimeout(r, 4000));

  btn.textContent = '詠唱中...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: selected, type: selectedType })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const text = data.text;

    document.getElementById('resultText').textContent = text;
    document.getElementById('resultPreview').classList.add('visible');

    const ts = Date.now();
    localStorage.setItem('chant_data', JSON.stringify({ text, timestamp: ts, type: selectedType, words: [...selected] }));
    saveHistory({ text, words: [...selected], type: selectedType, timestamp: ts });
    addRateLog();

    if (speechEnabled && 'speechSynthesis' in window) {
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.75;
      utterance.pitch = 0.8;
      utterance.volume = 1.0;
      utterance.onend = () => { btn.disabled = false; btn.textContent = '詠唱生成'; updateRateInfo(); };
      utterance.onerror = () => { btn.disabled = false; btn.textContent = '詠唱生成'; updateRateInfo(); };
      speechSynthesis.speak(utterance);
      return;
    }
  } catch (e) {
    alert('エラー: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '詠唱生成';
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('chant_history') || '[]'); } catch { return []; }
}
function saveHistory(entry) {
  const history = [entry, ...getHistory()].slice(0, 5);
  localStorage.setItem('chant_history', JSON.stringify(history));
  renderHistory();
}
function deleteHistory(i) {
  const history = getHistory();
  history.splice(i, 1);
  localStorage.setItem('chant_history', JSON.stringify(history));
  renderHistory();
}
function replayChant(i) {
  const entry = getHistory()[i];
  if (!entry) return;
  localStorage.setItem('chant_data', JSON.stringify({ text: entry.text, type: entry.type, words: entry.words, timestamp: Date.now() }));
}
function renderHistory() {
  const list = document.getElementById('historyList');
  const history = getHistory();
  if (history.length === 0) { list.innerHTML = '<span class="placeholder-text">まだ履歴がありません</span>'; return; }
  list.innerHTML = '';
  history.forEach((entry, i) => {
    const card = document.createElement('div');
    card.className = 'history-card';
    const typeColors = { '召喚': 'rgba(160,120,48,0.05)', '解放': 'rgba(90,138,128,0.05)', '封印': 'rgba(106,90,138,0.05)', '滅亡': 'rgba(122,48,48,0.05)', '覚醒': 'rgba(90,122,90,0.05)' };
    card.style.background = typeColors[entry.type] || 'rgba(160,120,48,0.05)';
    const time = new Date(entry.timestamp);
    const hh = String(time.getHours()).padStart(2, '0');
    const mm = String(time.getMinutes()).padStart(2, '0');
    const tags = (entry.words || []).map(w => `<span class="history-tag">${esc(w)}</span>`).join('');
    card.innerHTML = `<div class="history-chant">${esc(entry.text)}</div>
      <div class="history-meta">${tags}<span class="history-time">${hh}:${mm}</span>
      <div class="history-actions"><button class="history-btn replay" onclick="copyHistoryChant(${i}, this)">コピー</button><button class="history-btn replay" onclick="replayChant(${i})">再表示</button><button class="history-btn delete" onclick="deleteHistory(${i})">削除</button></div></div>`;
    list.appendChild(card);
  });
}

function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
}
function toggleSpeech() {
  speechEnabled = !speechEnabled;
  document.getElementById('speechToggle').classList.toggle('active', speechEnabled);
}
let guideEnabled = localStorage.getItem('show_guide') !== 'false';
document.getElementById('guideToggle').classList.toggle('active', guideEnabled);
function toggleGuide() {
  guideEnabled = !guideEnabled;
  localStorage.setItem('show_guide', guideEnabled);
  document.getElementById('guideToggle').classList.toggle('active', guideEnabled);
}

// SE controls
const seToggleEl = document.getElementById('seToggle');
const seVolumeEl = document.getElementById('seVolume');
seToggleEl.classList.toggle('active', sfx.enabled);
seVolumeEl.value = sfx.volume * 100;
if (!sfx.enabled) seVolumeEl.classList.add('disabled');

function toggleSE() {
  sfx.setEnabled(!sfx.enabled);
  seToggleEl.classList.toggle('active', sfx.enabled);
  seVolumeEl.classList.toggle('disabled', !sfx.enabled);
  if (sfx.enabled && bgmEnabled) sfx.startBGM();
}
function setSEVolume(val) {
  sfx.setVolume(val / 100);
}

// BGM controls
let bgmEnabled = localStorage.getItem('bgm_enabled') !== 'false';
const bgmToggleEl = document.getElementById('bgmToggle');
bgmToggleEl.classList.toggle('active', bgmEnabled);

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('bgm_enabled', bgmEnabled);
  bgmToggleEl.classList.toggle('active', bgmEnabled);
  if (bgmEnabled && sfx.enabled) {
    sfx.startBGM();
  } else {
    sfx.stopBGM();
  }
}

// ページ読み込み時にBGM自動開始（ユーザー操作で初期化）
document.addEventListener('click', function initBGM() {
  if (bgmEnabled && sfx.enabled) sfx.startBGM();
  document.removeEventListener('click', initBGM);
}, { once: true });

function doCopy(text, btn) {
  sfx.uiConfirm();
  const orig = btn.textContent;
  const showSuccess = () => {
    btn.textContent = '完了';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showSuccess).catch(() => { fallbackCopy(text); showSuccess(); });
  } else { fallbackCopy(text); showSuccess(); }
}
function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed';
  el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}
function copyChant() {
  doCopy(document.getElementById('resultText').textContent, document.getElementById('copyBtn'));
}
function copyHistoryChant(i, btn) {
  const entry = getHistory()[i];
  if (entry) doCopy(entry.text, btn);
}

renderHistory();

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
